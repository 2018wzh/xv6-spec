id: user/stubs.generate_usys_S

module: user/stubs

operation: generate_usys_S
stage: full-syscall
purpose: >
  Generate user/usys.S: assembly stubs for all system calls. Each stub loads the syscall number into a7 and executes ecall. Covers fork, exit, wait, pipe, write, read, close, kill, exec, open, mknod, unlink, fstat, link, mkdir, chdir, dup, getpid, sbrk, pause, uptime.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/stubs
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - user/usys.S generated with all syscall stubs
  emitted_events: []
preconditions:
  []
postconditions:
  - each stub correctly loads syscall number and invokes ecall
invariants_preserved:
  []
failure_semantics:
  - none (build-time)

concurrency:
  atomicity: build-time only
  lock_order:
    []
  interrupt_state: n/a
  wait_wakeup_rules: []

security:
  authority_check: n/a
  isolation_boundary: n/a
  user_pointer_policy: n/a

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - usys_stub_gen
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: file
      path: user/usys.S
      symbols: [generate_usys_S]
      owner: user/stubs
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
