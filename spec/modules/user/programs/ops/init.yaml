id: user/programs.init
module: user/programs
operation: generate_init_c
stage: process
purpose: >
  Generate user/init.c, the first user-mode program (pid 1).
  Writes "init: starting\n" via the write syscall (ecall
  with a7=16, a0=1 for fd 1), then enters an infinite
  loop to keep the system running. Must be compiled as a
  freestanding RISC-V user binary with user/user.ld.

related_slice: slice-04-process
related_adr: null
depends_on:
  requires_modules:
    - user/programs
    - kernel/syscall
  requires_ops:
    - user/programs.user_ld
    - kernel/syscall.sys_write

rely:
  state_assumptions:
    - kernel is fully initialized before init runs
    - sys_write maps fd 1 to the console UART
  callable_interfaces:
    - sys_write (via ecall)
  resource_assumptions:
    - kernel provides a valid user page table
  lock_assumptions: []

guarantee:
  returns:
    - void (never returns)
  state_updates: []
  side_effects:
    - prints "init: starting\n" to console
    - enters infinite loop (with yields)
  emitted_events: []

preconditions:
  - user page table set up with trampoline and trapframe
  - syscall dispatch table populated
postconditions:
  - init process is running in U-mode
invariants_preserved:
  - init never exits (system panics if init exits)
failure_semantics:
  - panics if sys_write fails (unexpected)

concurrency:
  atomicity: single-hart user execution
  lock_order: []
  interrupt_state: interrupts enabled in U-mode
  wait_wakeup_rules: []

security:
  authority_check: init runs with user privileges
  isolation_boundary: U-mode, independent page table
  user_pointer_policy: uses ecall for kernel services

observability:
  traces: []
  counters: []
  expected_logs:
    - '"init: starting" appears in console output'

test_obligations:
  public:
    - init_prints_banner
    - init_does_not_exit
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: user/init.c
      symbols: [generate_init_c]
      owner: user/programs
      mode: create
  forbidden_changes:
    - do not modify files outside user/
  required_followup_checks:
    - make build
