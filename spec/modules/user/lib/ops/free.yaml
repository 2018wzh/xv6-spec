id: user/lib.free

module: user/lib

operation: free
stage: full-syscall
purpose: >
  Return previously malloc'd memory to the free list. Coalesces adjacent free blocks when possible. Does not return memory to the OS.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/lib
  requires_ops:
    - user/lib.malloc

rely:
  state_assumptions:
    - ptr was previously returned by malloc
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - block added to free list
    - adjacent free blocks coalesced
  emitted_events: []
preconditions:
  - ptr != 0
  - ptr was returned by malloc
postconditions:
  - memory is available for future malloc
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: user-space only
  lock_order:
    []
  interrupt_state: enabled (user mode)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: user-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - free_basic
    - free_coalesce
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: user/umalloc.c
      symbols: [free]
      owner: user/lib
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
