id: user/lib.gets

module: user/lib

operation: gets
stage: full-syscall
purpose: >
  Read a line from fd 0 (stdin) into buf. Reads at most max-1 characters, stopping at newline or EOF. NUL-terminates the result.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/lib
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - char* (buf) on success
    - 0 on EOF
  state_updates: []
  side_effects:
    - line read from stdin
    - buf NUL-terminated
  emitted_events: []
preconditions:
  []
postconditions:
  - buf contains the input line without trailing newline
invariants_preserved:
  []
failure_semantics:
  - returns 0 on EOF

concurrency:
  atomicity: user-space only
  lock_order:
    []
  interrupt_state: enabled (user mode)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: user-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - gets_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: user/ulib.c
      symbols: [gets]
      owner: user/lib
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
