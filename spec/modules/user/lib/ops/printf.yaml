id: user/lib.printf

module: user/lib

operation: printf
stage: full-syscall
purpose: >
  Formatted print to stdout (fd 1). Supports %d, %x, %p, %s, %c, %%. Wrapper around fprintf(1, ...).

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/lib
  requires_ops:
    - user/lib.fprintf

rely:
  state_assumptions:
  callable_interfaces:
    - fprintf (internal)
    - write (syscall)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - formatted output written to fd 1
  emitted_events: []
preconditions:
  []
postconditions:
  - output visible on stdout
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: user-space only
  lock_order:
    []
  interrupt_state: enabled (user mode)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: user-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - printf_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: user/printf.c
      symbols: [printf]
      owner: user/lib
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
