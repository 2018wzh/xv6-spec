id: user/lib.malloc

module: user/lib

operation: malloc
stage: full-syscall
purpose: >
  Allocate n bytes of memory from the user heap. Maintains a free list of previously freed blocks. Allocates new memory from the OS via sbrk when needed. Returns 16-byte aligned pointers.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/lib
  requires_ops:
    - user/lib.sbrk
    - user/lib.free

rely:
  state_assumptions:
    - free list is initialized
  callable_interfaces:
    - sbrk (internal)
    - memset (from user/lib)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void*: 16-byte aligned pointer to n bytes
    - 0 on failure
  state_updates: []
  side_effects:
    - free list updated
    - heap may be extended
  emitted_events: []
preconditions:
  []
postconditions:
  - returned memory is zeroed
  - pointer is 16-byte aligned
invariants_preserved:
  []
failure_semantics:
  - returns 0 if sbrk fails

concurrency:
  atomicity: user-space only
  lock_order:
    []
  interrupt_state: enabled (user mode)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: user-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - malloc_basic
    - malloc_alignment
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: user/umalloc.c
      symbols: [malloc]
      owner: user/lib
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
