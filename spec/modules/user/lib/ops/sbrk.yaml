id: user/lib.sbrk

module: user/lib

operation: sbrk
stage: full-syscall
purpose: >
  Allocate n bytes of heap memory. Wrapper around the sbrk syscall with SBRK_EAGER flag.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/lib
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - sys_sbrk (syscall)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void*: pointer to allocated memory
    - (char*)-1 on failure
  state_updates: []
  side_effects:
    - heap extended by n bytes
  emitted_events: []
preconditions:
  []
postconditions:
  - memory is zeroed
invariants_preserved:
  []
failure_semantics:
  - returns (char*)-1 on failure

concurrency:
  atomicity: user-space only
  lock_order:
    []
  interrupt_state: enabled (user mode)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: user-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sbrk_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: user/ulib.c
      symbols: [sbrk]
      owner: user/lib
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
