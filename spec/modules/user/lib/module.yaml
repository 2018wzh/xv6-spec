id: user/lib
module: user/lib
stage: full-syscall
purpose: >
  User-space C library providing system call wrappers, string
  utilities, formatted printf, and memory allocation (malloc/free).
  Linked into every user program.
related_slices:
  - slice-09-full-syscall
related_adrs: []
owned_state:
  - malloc free list (user-space heap)
  - printf state (per-call)
exported_interfaces:
  - strcpy, memmove, strchr, strcmp, gets, strlen, memset, atoi, memcmp, memcpy, sbrk, stat
  - fprintf, printf
  - malloc, free
imported_interfaces:
  - syscall stubs (from user/stubs)
module_invariants:
  - malloc returns 16-byte aligned pointers
  - printf format specifiers match kernel printk subset
  - string functions are freestanding (no libc dependency)
error_model:
  - malloc returns 0 on exhaustion
  - gets returns 0 on EOF
resource_lifetime_rules:
  - malloc'd memory must be freed via free
  - free list is a singly-linked list of free blocks
security_boundary:
  - user-space only; no kernel data access
test_surfaces:
  - malloc/free cycle
  - printf format coverage
  - string function correctness
