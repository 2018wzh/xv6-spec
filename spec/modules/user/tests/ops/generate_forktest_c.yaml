id: user/tests.generate_forktest_c

module: user/tests

operation: generate_forktest_c
stage: full-syscall
purpose: >
  Stress test for fork: repeatedly fork children and verify PIDs and memory isolation. Used to detect fork-related bugs.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - user/tests
    - user/lib
    - user/headers
    - user/stubs
  requires_ops:
    - user/lib.printf
    - user/lib.malloc

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - user/forktest.c generated
  emitted_events: []
preconditions:
  []
postconditions:
  - test program compiles
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: build-time only
  lock_order:
    []
  interrupt_state: n/a
  wait_wakeup_rules: []

security:
  authority_check: n/a
  isolation_boundary: n/a
  user_pointer_policy: n/a

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - forktest_compiles
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: user/forktest.c
      symbols: [generate_forktest_c]
      owner: user/tests
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
