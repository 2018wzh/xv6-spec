id: user/tests
module: user/tests
stage: full-syscall
purpose: >
  User-space test and stress programs: forktest (fork stress),
  usertests (comprehensive regression suite), grind (randomized
  syscall fuzzing). These programs exercise kernel functionality
  from user space and report pass/fail results.
related_slices:
  - slice-09-full-syscall
related_adrs: []
owned_state:
  - none (test programs only)
exported_interfaces:
  - generate_forktest_c
  - generate_usertests_c
  - generate_grind_c
imported_interfaces:
  - all syscall stubs (from user/stubs)
  - printf/malloc/free (from user/lib)
module_invariants:
  - test programs exit with 0 on success
  - test output is deterministic for a given kernel state
error_model:
  - test programs print error messages and exit(1) on failure
resource_lifetime_rules:
  - test programs allocate and free memory during execution
security_boundary:
  - user-space only; tests exercise syscall interface
test_surfaces:
  - usertests passes all sub-tests
  - forktest does not deadlock or leak processes
