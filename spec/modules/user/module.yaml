id: user
module: user
stage: full-syscall
purpose: >
  Aggregate namespace for user-space artifacts generated by the
  xv6 spec. This parent ModuleSpec expands stage-scoped to
  user/* descendants such as user/programs and user/lib.
related_slices:
  - slice-04-process
  - slice-09-full-syscall
related_adrs: []
owned_state:
  - none (aggregation namespace only)
exported_interfaces:
  - user/*
imported_interfaces:
  - kernel/syscall
  - kernel/sysfile
module_invariants:
  - references to user expand only to active user/* modules at the selected stage
  - concrete runtime behavior is defined by descendant user/* modules
error_model:
  - none directly; child modules define concrete error semantics
resource_lifetime_rules:
  - namespace remains stable for all generated user-space artifacts through stage full-syscall
security_boundary:
  - aggregates only U-mode or user-build artifacts
test_surfaces:
  - architecture slices may reference user as a stage-scoped aggregate
