id: kernel/trap.devintr

module: kernel/trap

operation: devintr
stage: trap
purpose: >
  Check if scause indicates a device interrupt.
  Handle timer interrupts via SBI timer extension.
  Returns 1 if a device interrupt was handled, 0 otherwise.

related_slice: slice-03-trap
related_adr: null
depends_on:
  requires_modules:
    - kernel/trap

  requires_ops: []

rely:
  state_assumptions:
    - scause contains the interrupt cause
  callable_interfaces:
    - SBI set_timer (ecall #0)
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - 1 if device interrupt handled
    - 0 if not a device interrupt
  state_updates: []
  side_effects:
    - SBI timer reprogrammed for next tick
  emitted_events:
    - none

preconditions:
  - called from trap handler with valid scause
postconditions:
  - next timer interrupt is scheduled
invariants_preserved:
  - no kernel state corruption
failure_semantics:
  - returns 0 for non-device interrupts

concurrency:
  atomicity: single ecall
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: none
  user_pointer_policy: none

observability:
  traces: []
  counters:
    - timer ticks
  expected_logs: []

test_obligations:
  public:
    - devintr_timer
    - devintr_non_device
  generated: []
  hidden_tags:
    - devintr_timer_frequency

codegen:
  targets:
    - kind: symbol
      path: kernel/trap.c
      symbols: [devintr]
      owner: kernel/trap
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
