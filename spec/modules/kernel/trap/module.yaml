id: kernel/trap

module: kernel/trap

stage: trap
purpose: >
  Trap vector installation, usermode/kernel trap dispatch,
  timer interrupt handling, and usermode return trampoline.
related_slices:
  - slice-03-trap
related_adrs: []
owned_state:
  - trap vector (stvec)
  - per-CPU trapframe pointer (no CPU struct in v0)
  - kernel stack for trap handling
exported_interfaces:
  - trap_init
  - kernelvec
  - trampoline
  - usertrap
  - kerneltrap
  - usertrapret
  - devintr
imported_interfaces: []
module_invariants:
  - stvec points to trampoline uservec during usermode
  - stvec points to kernelvec during kernel mode
  - trapframe is saved/restored atomically per trap entry
  - timer interrupts never nest
error_model:
  - unexpected traps in kernel mode cause panic
  - usertrap returns via usertrapret, never falls through
resource_lifetime_rules:
  - trapframe pages are freed when process exits
security_boundary:
  - user registers are sanitized before kernel access
  - sstatus.SPP tracks privilege correctly
  - sepc is saved and validated before resumption
test_surfaces:
  - trap vector verification
  - timer interrupt firing
  - user/kernel transition cycle
