id: kernel/printk.printk

module: kernel/printk

operation: printk
stage: device
purpose: >
  Formatted kernel print. Supports %d, %ld, %lld, %u, %lu, %llu, %x, %lx, %llx, %p, %c, %s, %%. Serialized by pr.lock (unless panicking).

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/printk
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - consputc (from kernel/console)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0
  state_updates: []
  side_effects:
    - formatted output written to console
  emitted_events: []
preconditions:
  - printkinit has been called
postconditions:
  - formatted string is on the console
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: pr.lock serializes concurrent printk calls
  lock_order:
    - pr.lock (unless panicking)
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - printk_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/printk.c
      symbols: [printk]
      owner: kernel/printk
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
