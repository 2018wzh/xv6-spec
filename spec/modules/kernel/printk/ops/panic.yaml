id: kernel/printk.panic

module: kernel/printk

operation: panic
stage: device
purpose: >
  Print a panic message and halt. Sets panicking=1, prints 'panic: ' followed by the message, sets panicked=1, and enters an infinite loop. Disables further UART output from other CPUs.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/printk
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - printk (internal)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void (never returns)
  state_updates: []
  side_effects:
    - panic message printed
    - kernel halted forever
  emitted_events: []
preconditions:
  []
postconditions:
  - kernel is halted
invariants_preserved:
  []
failure_semantics:
  - never returns; spins forever

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - panic_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/printk.c
      symbols: [panic]
      owner: kernel/printk
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
