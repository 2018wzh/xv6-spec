id: kernel/bio.bwrite

module: kernel/bio

operation: bwrite
stage: filesystem
purpose: >
  Write a locked buffer's contents to disk via virtio_disk_rw. The buffer must be locked (holdingsleep).

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/bio
  requires_ops:
    - kernel/bio.bread

rely:
  state_assumptions:
    - buffer is locked by caller
  callable_interfaces:
    - virtio_disk_rw (from kernel/virtio)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - caller must hold b->lock (sleeplock)

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - buffer contents written to disk
  emitted_events: []

preconditions:
  - caller holds b->lock
  - b->dev and b->blockno are valid
postconditions:
  - buffer contents are on disk
invariants_preserved:
  - buffer valid flag unchanged
failure_semantics:
  - none

concurrency:
  atomicity: under b->lock
  lock_order:
    - b->lock (held by caller)
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - bwrite_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/bio.c
      symbols: [bwrite]
      owner: kernel/bio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
