id: kernel/bio.bpin

module: kernel/bio

operation: bpin
stage: filesystem
purpose: >
  Pin a buffer by incrementing its reference count. Used by the logging layer to prevent eviction of blocks being modified in a transaction.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/bio
  requires_ops:
    - kernel/bio.bread

rely:
  state_assumptions:
    - buffer is valid
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires bcache.lock briefly

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - b->refcnt incremented
  emitted_events: []

preconditions:
  - buffer is currently in the cache
postconditions:
  - b->refcnt increased by 1
  - buffer cannot be evicted while refcnt > 0
invariants_preserved:
  - refcnt >= 1 after pin
failure_semantics:
  - none

concurrency:
  atomicity: bcache.lock for refcnt update
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - bpin_refcount
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/bio.c
      symbols: [bpin]
      owner: kernel/bio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
