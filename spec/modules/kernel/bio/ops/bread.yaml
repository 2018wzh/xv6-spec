id: kernel/bio.bread

module: kernel/bio

operation: bread
stage: filesystem
purpose: >
  Return a locked buffer containing the contents of the specified disk block (dev, blockno). If the block is already cached, return the cached buffer. Otherwise, allocate a new buffer, read the block from disk via virtio_disk_rw, and mark it valid.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/bio
  requires_ops:
    - kernel/bio.binit

rely:
  state_assumptions:
    - bcache is initialized
  callable_interfaces:
    - bget (internal)
    - virtio_disk_rw (from kernel/virtio)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - returns with buffer sleeplock held

guarantee:
  returns:
    - struct buf* (locked, with valid contents)
  state_updates: []
  side_effects:
    - may read from disk
    - buffer marked valid
    - buffer moved to head of LRU list (via brelse by previous user)
  emitted_events: []

preconditions:
  - bcache is initialized
postconditions:
  - returned buf has valid==1 and is locked
invariants_preserved:
  - cached blocks are reused
  - uncached blocks are read from disk
failure_semantics:
  - none

concurrency:
  atomicity: bcache.lock for lookup, b->lock for content
  lock_order:
    - bcache.lock (in bget)
    - b->lock (acquiresleep)
  interrupt_state: enabled (may sleep on disk I/O)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - bread_cache_hit
    - bread_cache_miss
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/bio.c
      symbols: [bread]
      owner: kernel/bio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
