id: kernel/bio.binit

module: kernel/bio

operation: binit
stage: filesystem
purpose: >
  Initialize the buffer cache: create a doubly-linked list of NBUF buffers, initialize each buffer's sleeplock, and set up the LRU ordering with bcache.head as sentinel.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/bio
  requires_ops:
    []

rely:
  state_assumptions:
    - bcache is uninitialized
  callable_interfaces:
    - initsleeplock (from kernel/lock)
    - initlock (from kernel/lock)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none during init

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - bcache linked list initialized
    - bcache.lock spinlock initialized
    - all NBUF buffer sleeplocks initialized
  emitted_events: []

preconditions:
  - called exactly once during boot, before any FS operation
postconditions:
  - bcache is ready for bread/bwrite/brelse
invariants_preserved:
  - bcache.head.prev points to the least-recently-used buffer
  - bcache.head.next points to the most-recently-used buffer
failure_semantics:
  - none

concurrency:
  atomicity: single-hart init
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - binit_buffer_list
    - binit_lock_initialized
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/bio.c
      symbols: [binit]
      owner: kernel/bio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
