id: kernel/bio.bunpin

module: kernel/bio

operation: bunpin
stage: filesystem
purpose: >
  Unpin a buffer by decrementing its reference count. Used by the logging layer after a transaction completes.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/bio
  requires_ops:
    - kernel/bio.bpin

rely:
  state_assumptions:
    - buffer has refcnt >= 1
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires bcache.lock briefly

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - b->refcnt decremented
  emitted_events: []

preconditions:
  - b->refcnt >= 1
postconditions:
  - b->refcnt decreased by 1
invariants_preserved:
  - refcnt >= 0
failure_semantics:
  - none

concurrency:
  atomicity: bcache.lock for refcnt update
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - bunpin_refcount
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/bio.c
      symbols: [bunpin]
      owner: kernel/bio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
