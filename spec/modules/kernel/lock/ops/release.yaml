id: kernel/lock.release

module: kernel/lock

operation: release
stage: filesystem
purpose: >
  Release a spinlock. Clear the cpu and locked fields, then re-enable interrupts (pop_off). Panics if the lock is not held by this CPU.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/lock
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - pop_off (internal)
    - holding (internal)
    - panic (from kernel/printk)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - lock released
    - interrupts re-enabled
  emitted_events: []
preconditions:
  - lock is held by this CPU
postconditions:
  - lock is free
  - interrupts are re-enabled
invariants_preserved:
  []
failure_semantics:
  - panics if lock not held by this CPU

concurrency:
  atomicity: atomic store
  lock_order:
    []
  interrupt_state: enabled after release (pop_off)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - release_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/spinlock.c
      symbols: [release]
      owner: kernel/lock
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
