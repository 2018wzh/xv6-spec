id: kernel/lock.push_off

module: kernel/lock

operation: push_off
stage: filesystem
purpose: >
  Disable device interrupts. Track nested disable depth in per-CPU noff/intena for correct re-enable on pop_off.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/lock
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - interrupts disabled
    - noff incremented
    - intena saved on first push
  emitted_events: []
preconditions:
  []
postconditions:
  - interrupts are disabled
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: per-CPU operation
  lock_order:
    []
  interrupt_state: disabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - push_off_basic
  generated: []
  hidden_tags:
    []

codegen:
