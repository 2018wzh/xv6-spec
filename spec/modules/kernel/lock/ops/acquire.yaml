id: kernel/lock.acquire

module: kernel/lock

operation: acquire
stage: filesystem
purpose: >
  Acquire a spinlock. Disable interrupts (push_off), use atomic exchange to grab the lock, record the owning CPU. Panics if the lock is already held by this CPU.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/lock
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - push_off (internal)
    - holding (internal)
    - panic (from kernel/printk)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - lock acquired
    - interrupts disabled
    - cpu field set
  emitted_events: []
preconditions:
  - lock is not already held by this CPU
postconditions:
  - lock is exclusively held by this CPU
invariants_preserved:
  []
failure_semantics:
  - panics on recursive acquisition

concurrency:
  atomicity: atomic exchange (amoswap)
  lock_order:
    - target lock (no other locks held)
  interrupt_state: disabled (push_off)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - acquire_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/spinlock.c
      symbols: [acquire]
      owner: kernel/lock
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
