id: kernel/lock.releasesleep

module: kernel/lock

operation: releasesleep
stage: filesystem
purpose: >
  Release a sleeping lock. Wake any process sleeping on this lock.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/lock
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - acquire/release (from kernel/lock)
    - wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - sleeplock unlocked
    - pid set to 0
    - sleeping processes woken
  emitted_events: []
preconditions:
  - lock is held by this process
postconditions:
  - sleeplock is free
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: internal spinlock protects state
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - releasesleep_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sleeplock.c
      symbols: [releasesleep]
      owner: kernel/lock
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
