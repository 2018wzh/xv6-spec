id: kernel/lock.acquiresleep

module: kernel/lock

operation: acquiresleep
stage: filesystem
purpose: >
  Acquire a sleeping lock. If the lock is held by another process, sleep until it is released. Records the holding process's pid.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/lock
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - acquire/release (from kernel/lock)
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - sleeplock locked
    - pid set to current process
  emitted_events: []
preconditions:
  []
postconditions:
  - sleeplock is exclusively held by this process
invariants_preserved:
  []
failure_semantics:
  - none (blocks until available)

concurrency:
  atomicity: internal spinlock protects state
  lock_order:
    []
  interrupt_state: enabled (may sleep)
  wait_wakeup_rules:
    - sleeps on lk if locked
    - woken by releasesleep

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - acquiresleep_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sleeplock.c
      symbols: [acquiresleep]
      owner: kernel/lock
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
