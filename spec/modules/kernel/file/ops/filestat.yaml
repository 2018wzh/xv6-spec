id: kernel/file.filestat

module: kernel/file

operation: filestat
stage: filesystem
purpose: >
  Get metadata about a file and copy it to a user-space struct stat via copyout.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/file
  requires_ops:
    - kernel/file.filealloc
    - kernel/memory.copyout
    - kernel/fs.ilock

rely:
  state_assumptions:
    - ftable is initialized
  callable_interfaces:
    - ilock/iunlock/stati (from kernel/fs)
    - copyout (from kernel/memory)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires ftable.lock for table operations

guarantee:
  returns:
    - int: 0 on success, -1 on failure
  state_updates: []
  side_effects:
    - stat data copied to user address
  emitted_events: []
preconditions:
  - file type is FD_INODE or FD_DEVICE
postconditions:
  - user receives valid stat data
invariants_preserved:
  []
failure_semantics:
  - returns -1 if not FD_INODE/DEVICE or copyout fails

concurrency:
  atomicity: ftable.lock for allocation/refcount, per-inode lock for inode ops
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - filestat_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/file.c
      symbols: [filestat]
      owner: kernel/file
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
