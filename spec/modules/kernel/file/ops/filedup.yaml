id: kernel/file.filedup

module: kernel/file

operation: filedup
stage: filesystem
purpose: >
  Increment the reference count of a struct file. Panics if ref < 1.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/file
  requires_ops:
    - kernel/file.filealloc

rely:
  state_assumptions:
    - ftable is initialized
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires ftable.lock for table operations

guarantee:
  returns:
    - struct file* (same as input)
  state_updates: []
  side_effects:
    - f->ref incremented
  emitted_events: []
preconditions:
  - f->ref >= 1
postconditions:
  - f->ref increased by 1
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: ftable.lock for allocation/refcount, per-inode lock for inode ops
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - filedup_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/file.c
      symbols: [filedup]
      owner: kernel/file
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
