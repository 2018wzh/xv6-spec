id: kernel/file.filewrite

module: kernel/file

operation: filewrite
stage: filesystem
purpose: >
  Write up to n bytes from a user buffer to a file. Dispatches based on file type: pipe -> pipewrite, device -> devsw write, inode -> writei (in chunks).

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/file
  requires_ops:
    - kernel/file.filealloc
    - kernel/pipe.pipewrite
    - kernel/fs.writei

rely:
  state_assumptions:
    - ftable is initialized
  callable_interfaces:
    - pipewrite (from kernel/pipe)
    - devsw write (device driver)
    - writei (from kernel/fs)
    - ilock/iunlock (from kernel/fs)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires ftable.lock for table operations

guarantee:
  returns:
    - int: number of bytes written, or -1 on error
  state_updates: []
  side_effects:
    - file offset advanced by bytes written (for FD_INODE)
    - new blocks may be allocated
    - log transactions for inode writes
  emitted_events: []
preconditions:
  - file must be writable
postconditions:
  - bytes written to file
invariants_preserved:
  []
failure_semantics:
  - returns -1 if file is not writable

concurrency:
  atomicity: ftable.lock for allocation/refcount, per-inode lock for inode ops
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - filewrite_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/file.c
      symbols: [filewrite]
      owner: kernel/file
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
