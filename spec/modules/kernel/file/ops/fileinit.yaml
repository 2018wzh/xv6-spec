id: kernel/file.fileinit

module: kernel/file

operation: fileinit
stage: filesystem
purpose: >
  Initialize the file table: set up ftable.lock spinlock. Called once during boot.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/file
  requires_ops:
    []

rely:
  state_assumptions:
    - ftable is initialized
  callable_interfaces:
    - initlock (from kernel/lock)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires ftable.lock for table operations

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - ftable.lock initialized
  emitted_events: []
preconditions:
  - called once during boot
postconditions:
  - file table ready for allocation
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: ftable.lock for allocation/refcount, per-inode lock for inode ops
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - fileinit_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/file.c
      symbols: [fileinit]
      owner: kernel/file
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
