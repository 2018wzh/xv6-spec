id: kernel/file.fileread

module: kernel/file

operation: fileread
stage: filesystem
purpose: >
  Read up to n bytes from a file into a user buffer. Dispatches based on file type: pipe -> piperead, device -> devsw read, inode -> readi.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/file
  requires_ops:
    - kernel/file.filealloc
    - kernel/pipe.piperead
    - kernel/fs.readi

rely:
  state_assumptions:
    - ftable is initialized
  callable_interfaces:
    - piperead (from kernel/pipe)
    - devsw read (device driver)
    - readi (from kernel/fs)
    - ilock/iunlock (from kernel/fs)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires ftable.lock for table operations

guarantee:
  returns:
    - int: number of bytes read, or -1 on error
  state_updates: []
  side_effects:
    - file offset advanced by bytes read (for FD_INODE)
  emitted_events: []
preconditions:
  - file must be readable
postconditions:
  - bytes copied to user buffer
invariants_preserved:
  []
failure_semantics:
  - returns -1 if file is not readable

concurrency:
  atomicity: ftable.lock for allocation/refcount, per-inode lock for inode ops
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - fileread_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/file.c
      symbols: [fileread]
      owner: kernel/file
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
