id: kernel/file.fileclose

module: kernel/file

operation: fileclose
stage: filesystem
purpose: >
  Decrement the reference count of a struct file. If ref reaches 0, release the underlying resource (pipe via pipeclose, inode via iput).

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/file
  requires_ops:
    - kernel/file.filealloc
    - kernel/pipe.pipeclose
    - kernel/fs.iput

rely:
  state_assumptions:
    - ftable is initialized
  callable_interfaces:
    - pipeclose (from kernel/pipe)
    - iput (from kernel/fs)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires ftable.lock for table operations

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - f->ref decremented
    - underlying resource freed if ref reaches 0
    - f->type set to FD_NONE
  emitted_events: []
preconditions:
  - f->ref >= 1
postconditions:
  - file is freed and available for reallocation
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: ftable.lock for allocation/refcount, per-inode lock for inode ops
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - fileclose_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/file.c
      symbols: [fileclose]
      owner: kernel/file
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
