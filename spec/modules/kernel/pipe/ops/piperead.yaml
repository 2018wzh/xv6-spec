id: kernel/pipe.piperead

module: kernel/pipe

operation: piperead
stage: ipc
purpose: >
  Read up to n bytes from a pipe into a user buffer. Block if the pipe is empty and the write end is still open. Wake writers when space is available.

related_slice: slice-07-ipc
related_adr: null
depends_on:
  requires_modules:
    - kernel/pipe
  requires_ops:
    - kernel/pipe.pipealloc
    - kernel/memory.copyout

rely:
  state_assumptions:
  callable_interfaces:
    - copyout (from kernel/memory)
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires pi->lock

guarantee:
  returns:
    - int: number of bytes read, or -1 on error
  state_updates: []
  side_effects:
    - data copied to user buffer
    - nread advanced
    - writers woken
  emitted_events: []
preconditions:
  []
postconditions:
  - bytes are in user buffer
invariants_preserved:
  []
failure_semantics:
  - returns -1 if write end is closed and pipe is empty, or process is killed

concurrency:
  atomicity: pi->lock held throughout, released during sleep
  lock_order:
    - pi->lock
  interrupt_state: enabled (may sleep)
  wait_wakeup_rules:
    - sleeps on &pi->nread when empty
    - wakes &pi->nwrite after reading

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: user addresses validated by copyin/copyout

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - piperead_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/pipe.c
      symbols: [piperead]
      owner: kernel/pipe
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
