id: kernel/pipe.pipealloc

module: kernel/pipe

operation: pipealloc
stage: ipc
purpose: >
  Allocate a pipe: create a pipe struct via kalloc, allocate two file descriptors (read end and write end) via filealloc, and link them to the pipe.

related_slice: slice-07-ipc
related_adr: null
depends_on:
  requires_modules:
    - kernel/pipe
  requires_ops:
    - kernel/file.filealloc
    - kernel/memory.kalloc

rely:
  state_assumptions:
  callable_interfaces:
    - filealloc (from kernel/file)
    - kalloc/kfree (from kernel/memory)
    - initlock (from kernel/lock)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires pi->lock

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - pipe allocated
    - two file descriptors created
    - pipe initialized (nread=0, nwrite=0, readopen=1, writeopen=1)
  emitted_events: []
preconditions:
  - neither file descriptor is in use
postconditions:
  - "on success: *f0 is the read end, *f1 is the write end"
invariants_preserved:
  []
failure_semantics:
  - returns -1 on allocation failure; cleans up partial allocations

concurrency:
  atomicity: pi->lock
  lock_order:
    - pi->lock
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: user addresses validated by copyin/copyout

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - pipealloc_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/pipe.c
      symbols: [pipealloc]
      owner: kernel/pipe
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
