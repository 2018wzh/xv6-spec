module: kernel/pipe
shared_state:
  - pi->data[PIPESIZE] (circular buffer)
  - pi->nread, pi->nwrite (read/write pointers)
  - pi->readopen, pi->writeopen (end-of-pipe flags)
lock_types:
  - pi->lock: spinlock (protects all pipe state)
lock_order:
  - pi->lock only (no nested locks)
atomic_sections:
  - pipewrite: holds pi->lock throughout; may sleep on &pi->nwrite
  - piperead: holds pi->lock throughout; may sleep on &pi->nread
  - pipeclose: holds pi->lock, decrements open flags, may kfree
interrupt_rules:
  - pi->lock is never held across copyin/copyout (released during sleep)
wait_wakeup_rules:
  - pipewrite sleeps on &pi->nwrite when buffer is full; wakes on piperead or pipeclose
  - piperead sleeps on &pi->nread when buffer is empty and writeopen; wakes on pipewrite or pipeclose
  - pipeclose wakes both &pi->nread and &pi->nwrite
rely:
  - copyin/copyout handle user address validation
  - sleep/wakeup correctly manage the wait channel
guarantee:
  - every byte written is either read or discarded on close
  - pipewrite returns actual bytes written (may be < n if killed)
  - piperead returns actual bytes read (may be -1 if killed)
forbidden_patterns:
  - accessing pipe after kfree (race with pipeclose on last close)
  - assuming piperead always returns the requested number of bytes
