id: kernel/start
module: kernel/start
stage: boot
purpose: >
  Machine-mode entry point (start.c). Configures mstatus for S-mode mret, delegates all interrupts/exceptions to S-mode, sets up Physical Memory Protection (PMP), configures timer interrupts, and switches to supervisor mode.
related_slices:
  - slice-01-boot
related_adrs:
  []
owned_state:
  - stack0[4096 * NCPU] (per-CPU boot stack)
exported_interfaces:
  - start
  - timerinit
imported_interfaces:
  - main (from kernel/boot)
module_invariants:
  - mstatus.MPP is set to Supervisor before mret
  - all interrupts and exceptions delegated to S-mode
  - PMP gives S-mode access to all physical memory
  - timer interrupts are configured via sstc extension
error_model:
  - no error handling; machine-mode entry is expected to succeed
resource_lifetime_rules:
  - start() runs once per hart at boot; never returns
security_boundary:
  - machine-mode setup is the most privileged; must correctly configure delegation before switching to S-mode
test_surfaces:
  - unit tests for all exported functions
  - integration tests with dependent modules
