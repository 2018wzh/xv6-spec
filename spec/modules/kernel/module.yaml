id: kernel
module: kernel
stage: full-syscall
purpose: >
  Aggregate namespace for all kernel-space xv6 modules. This
  parent ModuleSpec is referenced by late-stage architecture
  composition and expands stage-scoped to kernel/* descendants.
related_slices:
  - slice-01-boot
  - slice-02-memory
  - slice-03-trap
  - slice-04-process
  - slice-05-syscall
  - slice-06-filesystem
  - slice-07-ipc
  - slice-08-device
  - slice-09-full-syscall
related_adrs: []
owned_state:
  - none (aggregation namespace only)
exported_interfaces:
  - kernel/*
imported_interfaces: []
module_invariants:
  - references to kernel expand only to active kernel/* modules at the selected stage
  - concrete runtime behavior is defined by descendant kernel/* modules
error_model:
  - none directly; child modules define concrete error semantics
resource_lifetime_rules:
  - namespace remains stable for all kernel descendants through stage full-syscall
security_boundary:
  - aggregates only S-mode kernel modules
test_surfaces:
  - architecture slices may reference kernel as a stage-scoped aggregate
