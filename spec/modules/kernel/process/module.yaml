id: kernel/process

module: kernel/process

stage: process
purpose: >
  Process abstraction: process table, per-process state,
  kernel thread context, round-robin scheduler, and
  lifecycle operations (fork, exit, wait, sleep, wakeup).
related_slices:
  - slice-04-process
related_adrs: []
owned_state:
  - process table (struct proc proc[NPROC])
  - current process pointer
  - scheduler state
exported_interfaces:
  - proc_init
  - allocproc
  - freeproc
  - scheduler
  - swtch
  - yield
  - fork
  - exit
  - wait
  - sleep
  - wakeup
  - growproc
  - userinit
imported_interfaces: []
module_invariants:
  - at most NPROC processes exist simultaneously
  - RUNNABLE processes have valid pagetable and trapframe
  - only one process is RUNNING per hart
  - process 0 is the scheduler context
  - a parent must not be freed before all children exit
error_model:
  - allocproc returns NULL when table is full
  - fork returns -1 on allocation failure
  - exit never returns
resource_lifetime_rules:
  - process pages (pagetable + trapframe + kernel stack)
    are freed by freeproc on exit/wait
  - parent reaps child resources via wait
security_boundary:
  - user addresses validated via walkaddr/copyin/copyout
  - fork creates independent memory (no shared writable pages)
  - exit clears process state before marking ZOMBIE
test_surfaces:
  - fork-exit-wait cycle
  - scheduler fairness
  - NPROC exhaustion
