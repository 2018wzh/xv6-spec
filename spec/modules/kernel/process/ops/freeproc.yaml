id: kernel/process.freeproc

module: kernel/process

operation: freeproc
stage: process
purpose: >
  Release all resources held by a process: free the user
  page table, trapframe page, and kernel stack. Mark the
  process slot as UNUSED.

related_slice: slice-04-process
related_adr: null
depends_on:
  requires_modules:
    - kernel/process

    - kernel/memory

  requires_ops:
    - kernel/memory.uvmfree

    - kernel/memory.kfree


rely:
  state_assumptions:
    - process is in ZOMBIE state
    - process has a valid pagetable and trapframe
  callable_interfaces:
    - uvmfree, kfree
  resource_assumptions:
    - none
  lock_assumptions:
    - p->lock is held

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - user pagetable freed
    - trapframe page freed
    - kernel stack freed
    - process state set to UNUSED
  emitted_events:
    - none

preconditions:
  - process is ZOMBIE
  - caller holds p->lock
postconditions:
  - process slot is reusable
invariants_preserved:
  - no resource leak
failure_semantics:
  - none (always succeeds)

concurrency:
  atomicity: under p->lock
  lock_order:
    - p->lock
  interrupt_state: push_off/pop_off
  wait_wakeup_rules: []

security:
  authority_check: only parent or init may free
  isolation_boundary: all user pages reclaimed
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - freeproc_releases_memory
    - freeproc_unused_after
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/process.c
      symbols: [freeproc]
      owner: kernel/process
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
