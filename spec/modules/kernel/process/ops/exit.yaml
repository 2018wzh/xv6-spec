id: kernel/process.exit

module: kernel/process

operation: exit
stage: process
purpose: >
  Terminate the current process, wake the parent,
  reparent any children to process 1, and yield the CPU.

related_slice: slice-04-process
related_adr: null
depends_on:
  requires_modules:
    - kernel/process

  requires_ops:
    - kernel/process.wakeup
    - kernel/process.yield_cpu


rely:
  state_assumptions:
    - current process is not the init process
  callable_interfaces:
    - wakeup, freeproc, yield
  resource_assumptions:
    - parent process exists
  lock_assumptions:
    - acquires p->lock, wait_lock

guarantee:
  returns:
    - never returns
  state_updates: []
  side_effects:
    - process state set to ZOMBIE
    - parent woken (if sleeping in wait)
    - children reparented to init
    - yields CPU via sched
  emitted_events:
    - none

preconditions:
  - called from usermode or kernel
postconditions:
  - process is ZOMBIE; resources freed by parent wait
invariants_preserved:
  - no process is orphaned
failure_semantics:
  - never returns; unrecoverable

concurrency:
  atomicity: state transitions under locks
  lock_order:
    - p->lock -> wait_lock
  interrupt_state: push_off/pop_off
  wait_wakeup_rules:
    - wakeup(parent) on exit

security:
  authority_check: any process can exit
  isolation_boundary: resources reclaimed after exit
  user_pointer_policy: none (process terminates)

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - exit_zombie
    - exit_reparent_to_init
  generated: []
  hidden_tags:
    - exit_double

codegen:
  targets:
    - kind: symbol
      path: kernel/process.c
      symbols: [exit]
      owner: kernel/process
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
