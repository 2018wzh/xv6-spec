module: kernel/process

test_surfaces:
  - proc_init_table_populated
  - allocproc_exhaustion
  - fork_returns_different_pid
  - fork_memory_isolation
  - fork_exhaustion
  - exit_zombie
  - exit_reparent_to_init
  - exit_double
  - wait_reap_child
  - wait_no_children
  - scheduler_runs
  - scheduler_round_robin
  - swtch_context_restore
  - yield_cpu_reschedule
  - growproc_expand
  - growproc_shrink
  - growproc_out_of_memory

required_tests:
  - test: fork_returns_different_pid
    description: parent receives child PID > 0, child receives 0
  - test: fork_memory_isolation
    description: parent and child share no writable pages after fork
  - test: exit_zombie
    description: after exit, process state is ZOMBIE
  - test: exit_reparent_to_init
    description: orphaned children are reparented to init (pid 1)
  - test: wait_reap_child
    description: wait returns child PID and frees child resources
  - test: scheduler_round_robin
    description: scheduler cycles through RUNNABLE processes fairly
  - test: swtch_context_restore
    description: swtch correctly restores callee-saved registers
  - test: growproc_expand
    description: growproc(n > 0) increases process memory
