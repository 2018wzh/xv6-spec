id: kernel/virtio.virtio_disk_init

module: kernel/virtio

operation: virtio_disk_init
stage: device
purpose: >
  Initialize the virtio block device: validate the virtio magic, reset the device, negotiate features, allocate descriptor rings (desc, avail, used), and configure the device.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/virtio
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - kalloc (from kernel/memory)
    - initlock (from kernel/lock)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - virtio device initialized
    - descriptor rings allocated
    - disk.lock initialized
  emitted_events: []
preconditions:
  - called once during boot
postconditions:
  - virtio disk is ready for I/O
invariants_preserved:
  []
failure_semantics:
  - panics if device not found or initialization fails

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - virtio_disk_init_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/virtio_disk.c
      symbols: [virtio_disk_init]
      owner: kernel/virtio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
