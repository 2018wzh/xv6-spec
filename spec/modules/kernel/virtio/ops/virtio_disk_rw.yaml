id: kernel/virtio.virtio_disk_rw

module: kernel/virtio

operation: virtio_disk_rw
stage: device
purpose: >
  Perform a disk read or write operation via virtio. Build a descriptor chain, submit it to the device, and sleep until the I/O completes.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/virtio
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - disk I/O submitted
    - caller sleeps until completion
  emitted_events: []
preconditions:
  - buffer is locked by caller
postconditions:
  - buffer contains disk data (for read) or data is on disk (for write)
invariants_preserved:
  []
failure_semantics:
  - panics if descriptor allocation fails

concurrency:
  atomicity: disk.lock for descriptor allocation
  lock_order:
    []
  interrupt_state: enabled (may sleep)
  wait_wakeup_rules:
    - sleeps on &disk after I/O submission
    - woken by virtio_disk_intr

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - virtio_disk_rw_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/virtio_disk.c
      symbols: [virtio_disk_rw]
      owner: kernel/virtio
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
