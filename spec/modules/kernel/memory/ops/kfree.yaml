id: kernel/memory.kfree

module: kernel/memory

operation: kfree
stage: memory
purpose: >
  Return an allocated page back to the freelist.
  Zero the page and link it at the head of the freelist.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.kinit


rely:
  state_assumptions:
    - freelist has been initialized by kinit
  callable_interfaces:
    - kmem.freelist (global)
  resource_assumptions:
    - the page was previously obtained from kalloc
  lock_assumptions:
    - acquires kmem.lock

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - page is re-linked to freelist head
    - page content is zeroed
  emitted_events:
    - none

preconditions:
  - pointer is 4096-byte aligned
  - pointer points to a valid physical page in range
postconditions:
  - page is on freelist
invariants_preserved:
  - freelist integrity
  - no page appears twice on freelist
failure_semantics:
  - caller is responsible for valid pointer
  - double-free may corrupt freelist (undefined)

concurrency:
  atomicity: freelist push under spinlock
  lock_order:
    - kmem.lock

  interrupt_state: lock is push_off / pop_off
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: none
  user_pointer_policy: never called with user pointers

observability:
  traces: []
  counters:
    - free count
  expected_logs: []

test_obligations:
  public:
    - kfree_valid
    - kalloc_kfree_cycle
  generated:
    - kfree_realignment
  hidden_tags:
    - kfree_double_free_detection
    - kfree_use_after_free

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [kfree]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
    - verify alloc-free cycle correctness
