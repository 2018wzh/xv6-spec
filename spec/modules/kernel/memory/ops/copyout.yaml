id: kernel/memory.copyout

module: kernel/memory

operation: copyout
stage: memory
purpose: >
  Copy data from kernel buffer to user virtual address,
  validating the destination address via walkaddr.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.walkaddr


rely:
  state_assumptions:
    - current process pagetable is valid
  callable_interfaces:
    - walkaddr, memmove
  resource_assumptions:
    - src buffer is valid kernel memory
  lock_assumptions:
    - none

guarantee:
  returns:
    - 0 on success
    - -1 on invalid user address
  state_updates: []
  side_effects:
    - user memory at dstva written with len bytes
  emitted_events:
    - none

preconditions:
  - src points to valid kernel buffer of at least len bytes
  - dstva is a user virtual address
postconditions:
  - dstva contains len bytes from src (on success)
invariants_preserved:
  - kernel memory is never disclosed via invalid copyout
failure_semantics:
  - returns -1 if walkaddr returns 0 for any page in range

concurrency:
  atomicity: per-page copy
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: user page must have U-bit and W-bit
  isolation_boundary: kernel buffer read-only
  user_pointer_policy: validate each page via walkaddr

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - copyout_valid_address
    - copyout_invalid_address
  generated:
    - copyout_readonly_page
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [copyout]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
