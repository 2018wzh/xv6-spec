id: kernel/memory.walk

module: kernel/memory

operation: walk
stage: memory
purpose: >
  Walk a three-level Sv39 page table to locate the PTE
  for a given virtual address. If alloc is set, allocate
  intermediate page-table pages as needed.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.kalloc


rely:
  state_assumptions:
    - pagetable is a valid L2 directory
  callable_interfaces:
    - kalloc (when alloc != 0)
  resource_assumptions:
    - free pages available if alloc != 0
  lock_assumptions:
    - none

guarantee:
  returns:
    - pte_t * to the L0 PTE on success
    - NULL if alloc==0 and a level is missing
    - NULL if alloc!=0 and kalloc fails
  state_updates: []
  side_effects:
    - intermediate PT pages allocated when alloc != 0
  emitted_events:
    - none

preconditions:
  - pagetable is page-aligned
  - va is a canonical Sv39 address (bits 63:39 sign-extended)
postconditions:
  - returned PTE is valid and writable
invariants_preserved:
  - Sv39 structure integrity
failure_semantics:
  - returns NULL on missing levels (alloc==0)
  - panics if va is not canonical

concurrency:
  atomicity: single read-path; alloc path not atomic
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: none
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - walk_existing
    - walk_missing_noalloc
  generated:
    - walk_alloc_create
    - walk_noncanonical
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [walk]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
