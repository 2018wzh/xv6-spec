id: kernel/memory.uvmalloc

module: kernel/memory

operation: uvmalloc
stage: memory
purpose: >
  Allocate PTEs and physical memory to grow a user process's
  address space from oldsz to newsz. Maps new pages with
  user read/write permissions.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.kalloc

    - kernel/memory.kvmmap

    - kernel/memory.walk


rely:
  state_assumptions:
    - pagetable is a valid user page table
  callable_interfaces:
    - kalloc, kvmmap, walk
  resource_assumptions:
    - free pages available for new PTEs and data pages
  lock_assumptions:
    - none

guarantee:
  returns:
    - newsz on success
    - oldsz on failure (no partial growth)
  state_updates: []
  side_effects:
    - new pages allocated and mapped from oldsz to newsz
    - each new page is zeroed
  emitted_events:
    - none

preconditions:
  - oldsz and newsz are page-aligned
  - newsz > oldsz
postconditions:
  - address range [oldsz, newsz) is mapped and accessible
invariants_preserved:
  - user page table integrity
  - new pages have PTE_U and PTE_W set
failure_semantics:
  - returns oldsz if kalloc fails (no partial mapping)
  - previously mapped pages are unaffected

concurrency:
  atomicity: non-atomic across page allocations
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: only current process's pagetable
  isolation_boundary: new pages isolated from kernel
  user_pointer_policy: new pages are user-accessible

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvmalloc_grow
    - uvmalloc_out_of_memory
  generated:
    - uvmalloc_zeroed
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [uvmalloc]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
