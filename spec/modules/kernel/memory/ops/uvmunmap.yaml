id: kernel/memory.uvmunmap

module: kernel/memory

operation: uvmunmap
stage: memory
purpose: >
  Remove npages of mappings starting at va from a page
  table. For each page, free the physical page if do_free
  is set, and clear the PTE. Panics if a PTE is missing.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.walk

    - kernel/memory.kfree


rely:
  state_assumptions:
    - pagetable is valid
    - va is page-aligned
  callable_interfaces:
    - walk, kfree
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - npages unmapped from pagetable
    - physical pages freed if do_free
  emitted_events:
    - none

preconditions:
  - va is page-aligned
  - npages > 0
postconditions:
  - "[va, va+npages*PGSIZE) has no valid mappings"
invariants_preserved:
  - page table consistency
failure_semantics:
  - panics if a PTE is missing (inconsistent state)

concurrency:
  atomicity: per-page operations
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: unmapped pages inaccessible
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvmunmap_valid_range
    - uvmunmap_empty_range
  generated:
    - uvmunmap_missing_pte_panic
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [uvmunmap]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
