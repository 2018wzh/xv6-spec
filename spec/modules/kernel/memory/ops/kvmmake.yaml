id: kernel/memory.kvmmake

module: kernel/memory

operation: kvmmake
stage: memory
purpose: >
  Create a kernel page table with direct-mapped identity
  mappings from 0x80000000 to PHYSTOP, plus trampoline
  page mapping at the top of the virtual address space.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.kalloc

    - kernel/memory.kvmmap


rely:
  state_assumptions:
    - physical memory is accessible from 0x80000000
  callable_interfaces:
    - kalloc (to allocate page table pages)
    - kvmmap (to install mappings)
  resource_assumptions:
    - sufficient free pages for 3-level page table
  lock_assumptions:
    - none (init only)

guarantee:
  returns:
    - pagetable_t (pointer to L2 page directory)
  state_updates: []
  side_effects:
    - kernel_pagetable is populated
    - trampoline code mapped at (TRAMPOLINE, MAXVA-PGSIZE]
    - UART, PLIC, VIRTIO mapped (optional)
  emitted_events:
    - none

preconditions:
  - called once during kernel init, after kinit
postconditions:
  - kernel_pagetable maps all kernel text/data/device regions
invariants_preserved:
  - PTEs have U-bit == 0
failure_semantics:
  - panics if kalloc fails during page table construction

concurrency:
  atomicity: init only
  lock_order: []
  interrupt_state: disabled
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: kernel mappings U-bit clear
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - kvmmake_identity_mapping
    - kvmmake_trampoline_mapped
  generated:
    - kvmmake_page_table_depth
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [kvmmake]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
    - verify satp write succeeds
