id: kernel/memory.uvminit

module: kernel/memory

operation: uvminit
stage: memory
purpose: >
  Initialize the first page of a user page table by
  mapping the trampoline code (at the top of the virtual
  address space) and allocating a trapframe page.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.kalloc

    - kernel/memory.kvmmap


rely:
  state_assumptions:
    - pagetable is empty (just allocated via uvmcreate)
  callable_interfaces:
    - kalloc, kvmmap
  resource_assumptions:
    - free pages available for trapframe
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - trampoline page mapped at TRAMPOLINE (read+execute)
    - trapframe page allocated and mapped at TRAPFRAME (read+write)
  emitted_events:
    - none

preconditions:
  - pagetable is a newly created empty page table
postconditions:
  - user page table has trampoline and trapframe mappings
invariants_preserved:
  - TRAMPOLINE mapping is identical in all user page tables
failure_semantics:
  - panics if kalloc fails for trapframe

concurrency:
  atomicity: init only
  lock_order: []
  interrupt_state: disabled
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: TRAMPOLINE is execute-only; trapframe is kernel-accessible
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvminit_trampoline_mapped
    - uvminit_trapframe_mapped
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [uvminit]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
