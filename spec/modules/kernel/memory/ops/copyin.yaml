id: kernel/memory.copyin

module: kernel/memory

operation: copyin
stage: memory
purpose: >
  Copy data from user virtual address to kernel buffer,
  validating the user address via walkaddr.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.walkaddr


rely:
  state_assumptions:
    - current process pagetable is valid
  callable_interfaces:
    - walkaddr, memmove
  resource_assumptions:
    - dst buffer is valid kernel memory
  lock_assumptions:
    - none

guarantee:
  returns:
    - 0 on success
    - -1 on invalid user address
  state_updates: []
  side_effects:
    - dst populated with len bytes from user memory
  emitted_events:
    - none

preconditions:
  - dst points to valid kernel buffer of at least len bytes
  - srcva is a user virtual address in current process
postconditions:
  - dst contains len bytes from srcva (on success)
invariants_preserved:
  - kernel is never corrupted by invalid user addresses
failure_semantics:
  - returns -1 if walkaddr returns 0 for any page in range

concurrency:
  atomicity: per-page copy
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: user page must have U-bit set
  isolation_boundary: kernel buffer protected
  user_pointer_policy: validate each page via walkaddr

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - copyin_valid_address
    - copyin_invalid_address
  generated:
    - copyin_boundary_crossing
  hidden_tags:
    - copyin_race

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [copyin]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
