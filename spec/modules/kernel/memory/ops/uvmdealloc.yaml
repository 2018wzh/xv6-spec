id: kernel/memory.uvmdealloc

module: kernel/memory

operation: uvmdealloc
stage: memory
purpose: >
  Deallocate user pages from oldsz down to newsz.
  Unmaps pages and frees physical memory. Used by
  growproc when shrinking the address space.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/memory

  requires_ops:
    - kernel/memory.uvmunmap


rely:
  state_assumptions:
    - pagetable is valid
    - pages in [newsz, oldsz) are mapped
  callable_interfaces:
    - uvmunmap
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - newsz on success
    - oldsz if newsz >= oldsz (no-op)
  state_updates: []
  side_effects:
    - pages in [newsz, oldsz) unmapped and freed
    - process->sz updated to newsz
  emitted_events:
    - none

preconditions:
  - oldsz > newsz
  - newsz >= 0
postconditions:
  - address space size reduced to newsz
invariants_preserved:
  - no dangling page mappings
failure_semantics:
  - returns oldsz (no-op) if newsz >= oldsz

concurrency:
  atomicity: non-atomic
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: only current process
  isolation_boundary: freed pages returned to allocator
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvmdealloc_shrink
    - uvmdealloc_noop
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/memory.c
      symbols: [uvmdealloc]
      owner: kernel/memory
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
