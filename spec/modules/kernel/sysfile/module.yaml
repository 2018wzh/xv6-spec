id: kernel/sysfile
module: kernel/sysfile
stage: full-syscall
purpose: >
  File-system system call implementations: sys_open, sys_close, sys_read, sys_write, sys_dup, sys_fstat, sys_link, sys_unlink, sys_mkdir, sys_mknod, sys_chdir, sys_pipe. Each validates user arguments and calls the appropriate file-system or file-table function.
related_slices:
  - slice-09-full-syscall
related_adrs:
  []
owned_state:
  - none (stateless; dispatches to file/fs/pipe modules)
exported_interfaces:
  - sys_dup
  - sys_read
  - sys_write
  - sys_close
  - sys_fstat
  - sys_link
  - sys_unlink
  - sys_open
  - sys_mkdir
  - sys_mknod
  - sys_chdir
  - sys_pipe
  - argfd
  - fdalloc
imported_interfaces:
  - filealloc/fileclose/filedup/fileread/filewrite/filestat (from kernel/file)
  - namei/nameiparent/ilock/iunlock/iunlockput/ialloc/dirlink/readi/writei (from kernel/fs)
  - pipealloc (from kernel/pipe)
  - argint/argaddr/argstr/fetchaddr (from kernel/syscall)
  - begin_op/end_op (from kernel/log)
module_invariants:
  - all user pointers validated before dereference
  - fd indices bounds-checked against NOFILE
  - path strings validated via argstr/fetchstr
  - permission flags (O_RDONLY/O_WRONLY/O_RDWR/O_CREATE/O_TRUNC) handled correctly
error_model:
  - returns -1 on invalid fd, bad path, or permission denial
  - sys_pipe returns 0 on success with two fds in user array
resource_lifetime_rules:
  - file descriptors are allocated via fdalloc and freed via fileclose
  - inodes acquired by namei are released via iunlockput
security_boundary:
  - every user pointer is validated; path traversal is gated by namei; fd access checked against file readable/writable flags
test_surfaces:
  - unit tests for all exported functions
  - integration tests with dependent modules
