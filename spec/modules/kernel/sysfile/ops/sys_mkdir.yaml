id: kernel/sysfile.sys_mkdir

module: kernel/sysfile

operation: sys_mkdir
stage: full-syscall
purpose: >
  Create a new directory at the given path. Allocate an inode of type T_DIR, add '.' and '..' entries, and link it into the parent directory.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/fs.nameiparent
    - kernel/fs.ialloc
    - kernel/fs.dirlink

rely:
  state_assumptions:
  callable_interfaces:
    - nameiparent/ialloc/ilock/iunlockput/dirlink (from kernel/fs)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - new directory created
    - . and .. entries added
    - parent directory updated
  emitted_events: []
preconditions:
  []
postconditions:
  - new directory exists with . and ..
invariants_preserved:
  []
failure_semantics:
  - returns -1 if path already exists or parent invalid

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_mkdir_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_mkdir]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
