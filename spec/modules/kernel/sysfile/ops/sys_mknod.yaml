id: kernel/sysfile.sys_mknod

module: kernel/sysfile

operation: sys_mknod
stage: full-syscall
purpose: >
  Create a special device file at the given path with the specified major and minor device numbers.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/fs.nameiparent
    - kernel/fs.ialloc
    - kernel/fs.dirlink

rely:
  state_assumptions:
  callable_interfaces:
    - nameiparent/ialloc/ilock/iunlockput/dirlink (from kernel/fs)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - device inode created
    - major/minor set
  emitted_events: []
preconditions:
  []
postconditions:
  - device file exists
invariants_preserved:
  []
failure_semantics:
  - returns -1 if path already exists

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_mknod_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_mknod]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
