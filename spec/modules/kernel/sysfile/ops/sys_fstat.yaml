id: kernel/sysfile.sys_fstat

module: kernel/sysfile

operation: sys_fstat
stage: full-syscall
purpose: >
  Get file metadata. Look up the fd and call filestat to copy the stat structure to a user buffer.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/sysfile.argfd
    - kernel/file.filestat

rely:
  state_assumptions:
  callable_interfaces:
    - argfd (internal)
    - argaddr (from kernel/syscall)
    - filestat (from kernel/file)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - stat structure copied to user address
  emitted_events: []
preconditions:
  - fd is valid
postconditions:
  - user has file metadata
invariants_preserved:
  []
failure_semantics:
  - returns -1 on invalid fd or copyout failure

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_fstat_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_fstat]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
