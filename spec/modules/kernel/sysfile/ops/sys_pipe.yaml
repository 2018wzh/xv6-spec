id: kernel/sysfile.sys_pipe

module: kernel/sysfile

operation: sys_pipe
stage: full-syscall
purpose: >
  Create a pipe and return two file descriptors (read end and write end) in a user-provided array.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/sysfile.fdalloc
    - kernel/pipe.pipealloc

rely:
  state_assumptions:
  callable_interfaces:
    - fdalloc (internal)
    - argaddr (from kernel/syscall)
    - pipealloc (from kernel/pipe)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - pipe created
    - two fds allocated
    - fd array in user space populated
  emitted_events: []
preconditions:
  []
postconditions:
  - p[0] is the read end
  - p[1] is the write end
invariants_preserved:
  []
failure_semantics:
  - returns -1 on allocation failure

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_pipe_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_pipe]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
