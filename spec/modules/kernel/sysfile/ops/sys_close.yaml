id: kernel/sysfile.sys_close

module: kernel/sysfile

operation: sys_close
stage: full-syscall
purpose: >
  Close a file descriptor. Clear the ofile entry and call fileclose on the underlying struct file.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/sysfile.argfd
    - kernel/file.fileclose

rely:
  state_assumptions:
  callable_interfaces:
    - argfd (internal)
    - fileclose (from kernel/file)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on invalid fd
  state_updates: []
  side_effects:
    - fd slot cleared
    - file ref count decremented
    - file may be freed
  emitted_events: []
preconditions:
  - fd is valid
postconditions:
  - fd is available for reuse
invariants_preserved:
  []
failure_semantics:
  - returns -1 on invalid fd

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_close_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_close]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
