id: kernel/sysfile.sys_link

module: kernel/sysfile

operation: sys_link
stage: full-syscall
purpose: >
  Create a hard link: create a new directory entry (new) pointing to the same inode as an existing file (old). Increment the inode's nlink.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/fs.namei
    - kernel/fs.nameiparent
    - kernel/fs.dirlink

rely:
  state_assumptions:
  callable_interfaces:
    - namei/nameiparent/ilock/iunlockput/dirlink (from kernel/fs)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - new directory entry created
    - inode nlink incremented
  emitted_events: []
preconditions:
  - old exists and is not a directory
postconditions:
  - old and new refer to the same inode
invariants_preserved:
  []
failure_semantics:
  - returns -1 if old doesn't exist, new already exists, or old is a directory

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_link_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_link]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
