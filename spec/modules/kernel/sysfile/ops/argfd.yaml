id: kernel/sysfile.argfd

module: kernel/sysfile

operation: argfd
stage: full-syscall
purpose: >
  Extract the nth syscall argument as a file descriptor. Validate fd range and look up the corresponding struct file. Returns 0 on success with *pf set, -1 on failure.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/syscall.argint

rely:
  state_assumptions:
  callable_interfaces:
    - argint (from kernel/syscall)
    - myproc (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on invalid fd
  state_updates: []
  side_effects:
    - "*pfd and *pf set on success"
  emitted_events: []
preconditions:
  []
postconditions:
  - "*pf points to a valid struct file with ref>=1"
invariants_preserved:
  []
failure_semantics:
  - returns -1 if fd is out of range or not open

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - argfd_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [argfd]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
