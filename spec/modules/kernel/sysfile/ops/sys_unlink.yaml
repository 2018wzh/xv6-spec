id: kernel/sysfile.sys_unlink

module: kernel/sysfile

operation: sys_unlink
stage: full-syscall
purpose: >
  Remove a directory entry. Decrement the inode's nlink. If nlink reaches 0 and no one has the inode open, free the inode and its blocks.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/fs.nameiparent
    - kernel/fs.dirlookup

rely:
  state_assumptions:
  callable_interfaces:
    - nameiparent/ilock/iunlockput/dirlookup (from kernel/fs)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - directory entry removed
    - inode nlink decremented
    - inode may be freed
  emitted_events: []
preconditions:
  - file exists
postconditions:
  - directory entry is gone
  - inode may be freed if nlink==0 and ref==0
invariants_preserved:
  []
failure_semantics:
  - returns -1 if file doesn't exist

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_unlink_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_unlink]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
