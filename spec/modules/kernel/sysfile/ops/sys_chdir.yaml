id: kernel/sysfile.sys_chdir

module: kernel/sysfile

operation: sys_chdir
stage: full-syscall
purpose: >
  Change the current working directory of the process to the given path. The directory must exist and be of type T_DIR.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/fs.namei

rely:
  state_assumptions:
  callable_interfaces:
    - namei/ilock/iunlockput (from kernel/fs)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - p->cwd updated to the new directory inode
  emitted_events: []
preconditions:
  []
postconditions:
  - p->cwd points to the new directory
  - old cwd's ref count decremented
invariants_preserved:
  []
failure_semantics:
  - returns -1 if path invalid or not a directory

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_chdir_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_chdir]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
