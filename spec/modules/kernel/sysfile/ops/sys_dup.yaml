id: kernel/sysfile.sys_dup

module: kernel/sysfile

operation: sys_dup
stage: full-syscall
purpose: >
  Duplicate a file descriptor. Find the lowest unused fd and make it point to the same struct file. Increment the file's reference count.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/sysfile.argfd
    - kernel/sysfile.fdalloc
    - kernel/file.filedup

rely:
  state_assumptions:
  callable_interfaces:
    - argfd/fdalloc (internal)
    - filedup (from kernel/file)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: new fd on success
    - -1 on failure
  state_updates: []
  side_effects:
    - new fd points to the same file
    - file ref count incremented
  emitted_events: []
preconditions:
  []
postconditions:
  - the old and new fds share the same file offset
invariants_preserved:
  []
failure_semantics:
  - returns -1 if fd is invalid or no free slot

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_dup_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_dup]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
