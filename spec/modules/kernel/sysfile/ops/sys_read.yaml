id: kernel/sysfile.sys_read

module: kernel/sysfile

operation: sys_read
stage: full-syscall
purpose: >
  Read up to n bytes from a file descriptor into a user buffer. Validates fd and calls fileread.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysfile
  requires_ops:
    - kernel/sysfile.argfd
    - kernel/file.fileread

rely:
  state_assumptions:
  callable_interfaces:
    - argfd (internal)
    - argint/argaddr (from kernel/syscall)
    - fileread (from kernel/file)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: number of bytes read, or -1 on error
  state_updates: []
  side_effects:
    - data copied to user buffer
  emitted_events: []
preconditions:
  - fd is valid
postconditions:
  - user buffer contains the read data
invariants_preserved:
  []
failure_semantics:
  - returns -1 on invalid fd or read error

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_read_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysfile.c
      symbols: [sys_read]
      owner: kernel/sysfile
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
