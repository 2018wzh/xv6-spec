id: kernel/console.consolewrite

module: kernel/console

operation: consolewrite
stage: device
purpose: >
  Write n bytes from a user buffer to the console. Copies data via copyin and outputs each byte via consputc.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/console
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - copyin (from kernel/memory)
    - consputc (internal)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: n (always succeeds)
  state_updates: []
  side_effects:
    - all n bytes written to UART
  emitted_events: []
preconditions:
  []
postconditions:
  []
invariants_preserved:
  []
failure_semantics:
  - none (always succeeds)

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - consolewrite_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/console.c
      symbols: [consolewrite]
      owner: kernel/console
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
