id: kernel/console.consoleread

module: kernel/console

operation: consoleread
stage: device
purpose: >
  Read up to n bytes from the console into a user buffer. Blocks until a full line is available (or EOF with ctrl-d). Copies data via either copyout or direct kernel access.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/console
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - copyout (from kernel/memory)
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: number of bytes read, or -1 on error
  state_updates: []
  side_effects:
    - data copied to user buffer
  emitted_events: []
preconditions:
  []
postconditions:
  []
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    - sleeps on &cons until a line is ready or EOF

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - consoleread_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/console.c
      symbols: [consoleread]
      owner: kernel/console
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
