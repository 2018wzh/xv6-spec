id: kernel/sysproc.sys_pause

module: kernel/sysproc

operation: sys_pause
stage: full-syscall
purpose: >
  Sleep for at least n clock ticks. If n is 0, returns immediately. Returns 0 on success, -1 if the process is killed while sleeping.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysproc
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - argint (from kernel/syscall)
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 if killed
  state_updates: []
  side_effects:
    - process sleeps for n ticks
  emitted_events: []
preconditions:
  []
postconditions:
  - at least n ticks have elapsed (or killed)
invariants_preserved:
  []
failure_semantics:
  - returns -1 if killed

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    - sleeps on &ticks
    - woken by clock interrupt

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_pause_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysproc.c
      symbols: [sys_pause]
      owner: kernel/sysproc
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
