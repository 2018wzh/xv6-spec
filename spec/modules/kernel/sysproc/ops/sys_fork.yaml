id: kernel/sysproc.sys_fork

module: kernel/sysproc

operation: sys_fork
stage: full-syscall
purpose: >
  Create a new child process by duplicating the calling process. Returns the child PID to the parent and 0 to the child.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysproc
  requires_ops:
    - kernel/process.fork

rely:
  state_assumptions:
  callable_interfaces:
    - kfork (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: child PID to parent
    - 0 to child
    - -1 on failure
  state_updates: []
  side_effects:
    - new child process created
  emitted_events: []
preconditions:
  []
postconditions:
  - parent and child are independent processes
invariants_preserved:
  []
failure_semantics:
  - returns -1 if fork fails

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_fork_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysproc.c
      symbols: [sys_fork]
      owner: kernel/sysproc
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
