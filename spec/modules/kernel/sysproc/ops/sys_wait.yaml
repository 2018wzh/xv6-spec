id: kernel/sysproc.sys_wait

module: kernel/sysproc

operation: sys_wait
stage: full-syscall
purpose: >
  Wait for a child process to exit. If the caller has no children, returns -1 immediately. Otherwise blocks until a child exits and returns its PID. Optionally copies the exit status to a user address.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysproc
  requires_ops:
    - kernel/process.wait

rely:
  state_assumptions:
  callable_interfaces:
    - argaddr (from kernel/syscall)
    - kwait (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: child PID on success
    - -1 on failure
  state_updates: []
  side_effects:
    - zombie child reaped
    - child resources freed
  emitted_events: []
preconditions:
  []
postconditions:
  - exited child is reaped
  - exit status copied to user address
invariants_preserved:
  []
failure_semantics:
  - returns -1 if no children exist

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_wait_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysproc.c
      symbols: [sys_wait]
      owner: kernel/sysproc
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
