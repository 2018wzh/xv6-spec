id: kernel/sysproc.sys_sbrk

module: kernel/sysproc

operation: sys_sbrk
stage: full-syscall
purpose: >
  Grow or shrink the process's heap by n bytes. Returns the old heap size. For eager allocation (SBRK_EAGER), calls growproc. For lazy allocation (SBRK_LAZY), only updates p->sz.

related_slice: slice-09-full-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/sysproc
  requires_ops:
    - kernel/process.growproc

rely:
  state_assumptions:
  callable_interfaces:
    - argint (from kernel/syscall)
    - growproc (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - uint64: old process size
    - -1 on failure
  state_updates: []
  side_effects:
    - p->sz updated
    - pages allocated (if eager)
  emitted_events: []
preconditions:
  []
postconditions:
  - heap size is changed
  - new pages are zeroed
invariants_preserved:
  []
failure_semantics:
  - returns -1 if growproc fails or address overflows

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_sbrk_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/sysproc.c
      symbols: [sys_sbrk]
      owner: kernel/sysproc
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
