id: kernel/log.commit

module: kernel/log

operation: commit
stage: filesystem
purpose: >
  Commit the current log transaction: write all logged blocks to the log area on disk, write the log header, then copy each block to its final location (install). Finally clear the log.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/log
  requires_ops:
    - kernel/log.log_write
    - kernel/bio.bread
    - kernel/bio.bwrite

rely:
  state_assumptions:
    - log.committing == 0
    - log.lh.n > 0
  callable_interfaces:
    - bread/bwrite/brelse/bunpin (from kernel/bio)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires log.lock
    - releases log.lock during disk writes

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - all logged blocks written to disk
    - log header written
    - blocks installed to final locations
    - log cleared
    - buffers unpinned
  emitted_events: []

preconditions:
  - log.outstanding == 0
  - no other commit in progress
postconditions:
  - log.lh.n == 0
  - all blocks are on disk in final locations
invariants_preserved:
  - atomic: all blocks written or none (after recovery)
failure_semantics:
  - none

concurrency:
  atomicity: log.lock for state, released during disk I/O
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    - wakes processes sleeping on &log after commit

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - commit_basic
    - commit_atomicity
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/log.c
      symbols: [commit]
      owner: kernel/log
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
