id: kernel/log.log_write

module: kernel/log

operation: log_write
stage: filesystem
purpose: >
  Mark a buffer for logging in the current transaction. The buffer is pinned (bpin) and its block number is recorded in the log header. The actual write to the log area happens at commit.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/log
  requires_ops:
    - kernel/log.begin_op
    - kernel/bio.bpin

rely:
  state_assumptions:
    - log.outstanding >= 1
  callable_interfaces:
    - bpin (from kernel/bio)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires log.lock

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - buffer pinned
    - block number added to log header
    - log.lh.n incremented
  emitted_events: []

preconditions:
  - called between begin_op and end_op
  - buffer is locked by caller
postconditions:
  - buffer will be written to log area at commit
invariants_preserved:
  - log.lh.n <= LOGBLOCKS
failure_semantics:
  - none

concurrency:
  atomicity: log.lock for header update
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - log_write_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/log.c
      symbols: [log_write]
      owner: kernel/log
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
