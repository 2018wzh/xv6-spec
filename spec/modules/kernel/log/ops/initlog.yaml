id: kernel/log.initlog

module: kernel/log

operation: initlog
stage: filesystem
purpose: >
  Initialize the logging system: read the superblock to locate the log area, recover from any incomplete transactions, and set up the log state.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/log
  requires_ops:
    - kernel/bio.bread

rely:
  state_assumptions:
    - superblock has been read
  callable_interfaces:
    - bread/brelse (from kernel/bio)
    - initlock (from kernel/lock)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none during init

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - log.lock initialized
    - log.start set from superblock
    - recovery performed if needed
  emitted_events: []

preconditions:
  - called once during fsinit
postconditions:
  - log is ready for begin_op/end_op
invariants_preserved:
  - log.outstanding == 0
  - log.committing == 0
failure_semantics:
  - none

concurrency:
  atomicity: single-hart init
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - initlog_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/log.c
      symbols: [initlog]
      owner: kernel/log
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
