id: kernel/log.begin_op

module: kernel/log

operation: begin_op
stage: filesystem
purpose: >
  Begin a file-system operation. Increment the outstanding operation count. If the log is near full or a commit is in progress, sleep until it is safe to proceed.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/log
  requires_ops:
    - kernel/log.initlog

rely:
  state_assumptions:
    - log is initialized
  callable_interfaces:
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - acquires log.lock briefly

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - log.outstanding incremented
  emitted_events: []

preconditions:
  - called by FS syscall entry point
postconditions:
  - log.outstanding > 0
  - caller may now call log_write
invariants_preserved:
  - log.outstanding >= 1 after call
failure_semantics:
  - none

concurrency:
  atomicity: log.lock for counter update
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    - sleeps on &log if log would overflow

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - begin_op_basic
    - begin_op_refcount
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/log.c
      symbols: [begin_op]
      owner: kernel/log
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
