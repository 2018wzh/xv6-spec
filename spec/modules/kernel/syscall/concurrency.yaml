module: kernel/syscall

shared_state:
  - syscall dispatch table (array of function pointers)
lock_types:
  - none (dispatch is non-preemptible on single hart)
lock_order: []
atomic_sections:
  - fd lookup and validation must observe a stable descriptor binding
  - user pointer validation via walkaddr is atomic per-page
interrupt_rules:
  - interrupts disabled during trap handling
  - do not hold scheduler-global locks across user buffer validation
wait_wakeup_rules: []
rely:
  - trap handler (usertrap) calls syscall() with validated sepc
  - argument registers (a0-a5) are correctly saved to trapframe
guarantee:
  - every user pointer is validated before kernel dereference
  - syscall number is bounds-checked before dispatch
forbidden_patterns:
  - dereferencing a user pointer without prior walkaddr check
  - returning to usermode without setting sepc += 4 on success
  - calling syscall handlers directly (bypassing the dispatcher)
