id: kernel/syscall.sys_sbrk

module: kernel/syscall

operation: sys_sbrk
stage: syscall
purpose: >
  Syscall wrapper for growproc. Reads the increment
  from a0 and calls growproc(n). Returns the old
  process size on success, -1 on failure.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

    - kernel/process

  requires_ops:
    - kernel/syscall.syscall

    - kernel/process.growproc


rely:
  state_assumptions:
    - current process has valid address space
  callable_interfaces:
    - growproc
  resource_assumptions:
    - free pages for positive n
  lock_assumptions:
    - none

guarantee:
  returns:
    - old process size on success
    - -1 on failure
  state_updates: []
  side_effects:
    - process address space grows or shrinks
  emitted_events:
    - none

preconditions:
  - a0 contains signed integer increment n
postconditions:
  - process->sz adjusted
invariants_preserved:
  - max user address boundary
failure_semantics:
  - returns -1 on growproc failure

concurrency:
  atomicity: growproc is non-atomic
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: only own process
  isolation_boundary: new pages user-accessible
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_sbrk_grow
    - sys_sbrk_shrink
  generated:
    - sys_sbrk_exhaustion
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [sys_sbrk]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
