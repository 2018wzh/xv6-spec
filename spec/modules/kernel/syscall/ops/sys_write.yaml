id: kernel/syscall.sys_write

module: kernel/syscall

operation: sys_write
stage: syscall
purpose: >
  Write bytes from a validated user buffer to a writable
  console via console_write. Validates the user buffer
  via copyin before passing data to the UART.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

    - kernel/boot

    - kernel/memory

  requires_ops:
    - kernel/syscall.argint

    - kernel/syscall.argaddr

    - kernel/syscall.fetchaddr

    - kernel/memory.copyin

    - kernel/boot.console_write


rely:
  state_assumptions:
    - current task is in user context
  callable_interfaces:
    - copyin
    - console_write
  resource_assumptions:
    - kernel buffer available for copyin
  lock_assumptions:
    - no global kernel lock is held

guarantee:
  returns:
    - number of bytes written on success
    - -1 on invalid user buffer
  state_updates: []
  side_effects:
    - bytes written to console UART via console_write
  emitted_events:
    - none

preconditions:
  - the caller passes a user buffer (a1) and a count (a2)
postconditions:
  - no unchecked user pointer is dereferenced
invariants_preserved:
  - kernel never overruns user buffer
failure_semantics:
  - return -1 when user buffer validation fails
  - return -1 when count is zero

concurrency:
  atomicity: syscall is non-preemptible on a single hart
  lock_order: []
  interrupt_state: interrupts disabled during trap handling
  wait_wakeup_rules: []

security:
  authority_check:
    - none (console write is unrestricted in MVP)
  isolation_boundary:
    - kernel buffer used for copyin is not user-accessible
  user_pointer_policy:
    - validate user buffer via copyin before any dereference

observability:
  traces: []
  counters:
    - sys_write_count
  expected_logs: []

test_obligations:
  public:
    - invalid_user_pointer_write
    - sys_write_basic
    - sys_write_large_buffer
  generated:
    - sys_write_empty_buffer
  hidden_tags:
    - sys_write_overflow

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [sys_write]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
