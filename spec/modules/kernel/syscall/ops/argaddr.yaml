id: kernel/syscall.argaddr

module: kernel/syscall

operation: argaddr
stage: syscall
purpose: >
  Extract a user virtual address argument from the nth
  register and validate it. Returns the pointer via ip.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

  requires_ops: []

rely:
  state_assumptions:
    - trapframe contains valid user register state
  callable_interfaces:
    - none
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - "0 and sets *ip on success"
    - "-1 if n out of range"
  state_updates: []
  side_effects:
    - "*ip written with user virtual address"
  emitted_events:
    - none

preconditions:
  - 0 <= n <= 5
postconditions:
  - "*ip contains the pointer"
invariants_preserved:
  - no kernel state mutation
failure_semantics:
  - "returns -1 for invalid n"
  - "note: does not validate the pointer itself; that is done by copyin/copyout/fetchaddr"

concurrency:
  atomicity: single register read
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: none
  isolation_boundary: pointer not yet dereferenced
  user_pointer_policy: caller must validate before use

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - argaddr_valid
    - argaddr_out_of_range
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [argaddr]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
