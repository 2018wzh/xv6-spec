id: kernel/syscall.syscall

module: kernel/syscall

operation: syscall
stage: syscall
purpose: >
  The central syscall dispatcher. Reads syscall number
  from a7, validates it against the dispatch table bounds,
  and calls the registered handler. Returns the handler's
  return value in a0.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

    - kernel/trap

  requires_ops:
    - kernel/trap.trap_init

    - kernel/trap.usertrap


rely:
  state_assumptions:
    - called from usertrap with user registers in trapframe
  callable_interfaces:
    - dispatch table entries
  resource_assumptions:
    - trapframe->a7 holds syscall number
  lock_assumptions:
    - none

guarantee:
  returns:
    - "int: handler return value stored in trapframe->a0"
  state_updates: []
  side_effects:
    - handler invoked
    - return value in trapframe->a0
  emitted_events:
    - none

preconditions:
  - a7 contains a valid or invalid syscall number
postconditions:
  - a0 contains return value
invariants_preserved:
  - dispatch table unchanged
failure_semantics:
  - "unknown syscall: return -1"

concurrency:
  atomicity: syscall is non-preemptible
  lock_order: []
  interrupt_state: interrupts disabled during trap
  wait_wakeup_rules: []

security:
  authority_check: dispatch table entries protect their own
    authority
  isolation_boundary: dispatch runs in kernel context
  user_pointer_policy: arguments validated by handlers

observability:
  traces: []
  counters:
    - syscall count
  expected_logs: []

test_obligations:
  public:
    - syscall_valid_number
    - syscall_invalid_number
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [syscall]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
