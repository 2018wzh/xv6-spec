id: kernel/syscall.fetchaddr

module: kernel/syscall

operation: fetchaddr
stage: syscall
purpose: >
  Fetch a word of data from a validated user virtual address.
  Calls walkaddr to resolve the user pointer to a physical
  address, then reads the word.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

    - kernel/memory

  requires_ops:
    - kernel/memory.walkaddr


rely:
  state_assumptions:
    - current process pagetable is valid
  callable_interfaces:
    - walkaddr
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - "0 on success, *ip set to fetched value"
    - "-1 on invalid user address"
  state_updates: []
  side_effects:
    - "*ip written with value from user memory"
  emitted_events:
    - none

preconditions:
  - addr is a user virtual address in current process
  - ip points to a valid kernel location
postconditions:
  - "*ip contains the value from addr (on success)"
invariants_preserved:
  - kernel never dereferences raw user pointers
failure_semantics:
  - returns -1 if walkaddr returns 0

concurrency:
  atomicity: single word fetch after address validation
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: user page must have U-bit set
  isolation_boundary: kernel accesses user memory via walkaddr
  user_pointer_policy: validate addr via walkaddr before load

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - fetchaddr_valid
    - fetchaddr_invalid
  generated:
    - fetchaddr_unaligned
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [fetchaddr]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
