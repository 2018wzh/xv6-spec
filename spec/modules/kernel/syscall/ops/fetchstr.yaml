id: kernel/syscall.fetchstr

module: kernel/syscall

operation: fetchstr
stage: syscall
purpose: >
  Fetch a null-terminated string from a validated user
  virtual address into a kernel buffer. Uses fetchaddr
  to read one word at a time until a null byte is found
  or maxlen is reached.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

    - kernel/memory

  requires_ops:
    - kernel/syscall.fetchaddr


rely:
  state_assumptions:
    - current process pagetable is valid
  callable_interfaces:
    - fetchaddr
  resource_assumptions:
    - dst buffer is valid kernel memory of at least maxlen bytes
  lock_assumptions:
    - none

guarantee:
  returns:
    - length of string copied (including null terminator)
    - -1 on invalid user address
  state_updates: []
  side_effects:
    - dst populated with null-terminated string from user memory
  emitted_events:
    - none

preconditions:
  - srcva is a user virtual address in current process
  - dst points to a valid kernel buffer of at least maxlen bytes
postconditions:
  - dst contains null-terminated string (on success)
invariants_preserved:
  - kernel never overruns kernel buffer
failure_semantics:
  - returns -1 if any page in the string range is invalid

concurrency:
  atomicity: per-word fetch after address validation
  lock_order: []
  interrupt_state: interrupts enabled
  wait_wakeup_rules: []

security:
  authority_check: user page must have U-bit set
  isolation_boundary: kernel buffer is kernel-only memory
  user_pointer_policy: validate each word via fetchaddr

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - fetchstr_valid
    - fetchstr_invalid
  generated:
    - fetchstr_maxlen_boundary
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [fetchstr]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
