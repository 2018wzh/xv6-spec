id: kernel/syscall.sys_exit

module: kernel/syscall

operation: sys_exit
stage: syscall
purpose: >
  Syscall wrapper for exit. Reads the exit status from
  a0, validates it, and calls exit() with the status.

related_slice: slice-05-syscall
related_adr: null
depends_on:
  requires_modules:
    - kernel/syscall

    - kernel/process

  requires_ops:
    - kernel/syscall.syscall

    - kernel/process.exit


rely:
  state_assumptions:
    - current process is valid
  callable_interfaces:
    - exit
  resource_assumptions:
    - none
  lock_assumptions:
    - none

guarantee:
  returns:
    - never returns (exit does not return)
  state_updates: []
  side_effects:
    - process transitions to ZOMBIE
  emitted_events:
    - none

preconditions:
  - a0 contains an integer exit status
postconditions:
  - process is ZOMBIE
invariants_preserved:
  - process lifecycle invariants
failure_semantics:
  - none (exit never fails)

concurrency:
  atomicity: exit holds necessary locks
  lock_order: []
  interrupt_state: irrelevant
  wait_wakeup_rules: []

security:
  authority_check: any process can exit
  isolation_boundary: exit reclaims resources
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - sys_exit_success
  generated: []
  hidden_tags: []

codegen:
  targets:
    - kind: symbol
      path: kernel/syscall.c
      symbols: [sys_exit]
      owner: kernel/syscall
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
