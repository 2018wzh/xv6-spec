module: kernel/syscall

test_surfaces:
  - syscall_valid_number
  - syscall_invalid_number
  - sys_write_valid_buffer
  - sys_write_invalid_fd
  - sys_write_invalid_user_pointer
  - sys_exit_success
  - sys_fork_parent_pid
  - sys_fork_child_zero
  - sys_fork_failure
  - sys_wait_reap_child
  - sys_wait_no_children
  - sys_sbrk_grow
  - sys_sbrk_shrink
  - sys_sbrk_out_of_memory
  - argint_valid
  - argint_out_of_range
  - argaddr_valid
  - argaddr_unaligned
  - fetchaddr_valid
  - fetchaddr_invalid
  - fetchstr_valid
  - fetchstr_invalid

required_tests:
  - test: syscall_valid_number
    description: syscall dispatches known syscall numbers correctly
  - test: syscall_invalid_number
    description: unknown syscall number returns -1
  - test: sys_write_invalid_fd
    description: sys_write with invalid fd returns -EINVAL
  - test: sys_write_invalid_user_pointer
    description: sys_write with unmapped user buffer returns -EFAULT
  - test: sys_fork_parent_pid
    description: sys_fork returns child PID to parent
  - test: sys_fork_child_zero
    description: sys_fork returns 0 to child
  - test: sys_sbrk_grow
    description: sys_sbrk(n > 0) returns old program break
  - test: argint_out_of_range
    description: argint with n > 5 returns -1
  - test: fetchaddr_invalid
    description: fetchaddr with unmapped user address returns -1
