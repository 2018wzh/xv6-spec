id: kernel/fs
module: kernel/fs
stage: filesystem
purpose: >
  xv6 inode-based file system. Five layers: block allocator,
  inode allocator/reader/writer, directory entries, path resolution,
  and file descriptor integration. Operates on a disk image
  formatted by mkfs.
related_slices:
  - slice-06-filesystem
related_adrs:
  - ADR-002-filesystem-model
owned_state:
  - superblock (struct superblock sb)
  - in-memory inode cache (itable)
  - per-inode sleeplocks
exported_interfaces:
  - fsinit
  - balloc, bfree
  - ialloc, iupdate, iget, iput
  - ilock, iunlock, iunlockput
  - readi, writei
  - dirlookup, dirlink
  - namei, nameiparent
  - skipelem
imported_interfaces:
  - bread/bwrite/brelse/bpin/bunpin (from kernel/bio)
  - begin_op/end_op/log_write (from kernel/log)
module_invariants:
  - superblock magic == FSMAGIC
  - every allocated inode has nlink >= 1
  - directory entries never span block boundaries
  - inode type is one of T_DIR, T_FILE, T_DEVICE
  - path resolution follows "." and ".." correctly
error_model:
  - ialloc returns 0 when no free inodes
  - balloc returns 0 when no free blocks
  - namei returns 0 for nonexistent paths
  - iput frees inode and blocks when nlink==0 and ref==0
resource_lifetime_rules:
  - inodes are cached in itable; iget/iput manage ref counts
  - blocks are freed via bfree when an inode is truncated
  - directory entries are freed when a file is unlinked
security_boundary:
  - path traversal validates each component via dirlookup
  - '"." and ".." are restricted to prevent escape'
  - file permissions are checked through struct file flags
test_surfaces:
  - inode alloc/free cycle
  - block alloc/free cycle
  - directory create/lookup/delete
  - path resolution edge cases
