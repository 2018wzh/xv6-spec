id: kernel/fs.dirlookup

module: kernel/fs

operation: dirlookup
stage: filesystem
purpose: >
  Search a directory inode for an entry with the given name. If found, return the corresponding inode number and optionally the byte offset of the entry.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/fs
  requires_ops:
    []

rely:
  state_assumptions:
    - file system is initialized
  callable_interfaces:
    - bread/bwrite/brelse (from kernel/bio)
    - begin_op/end_op/log_write (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - per-inode sleeplock for inode operations
    - log.lock for transaction boundaries

guarantee:
  returns:
    - int: 0 on success (found), -1 on failure (not found)
  state_updates: []
  side_effects:
    - "*poff set to byte offset if poff != 0"
  emitted_events: []

preconditions:
  - inode is locked
  - inode type == T_DIR
postconditions:
  []
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - dirlookup_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/fs.c
      symbols: [dirlookup]
      owner: kernel/fs
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
