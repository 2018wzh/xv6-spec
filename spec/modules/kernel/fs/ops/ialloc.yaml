id: kernel/fs.ialloc

module: kernel/fs

operation: ialloc
stage: filesystem
purpose: >
  Allocate a new inode on the given device. Find a free inode (type==0), mark it with the given type, and return the inode locked.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/fs
  requires_ops:
    - kernel/fs.iget
    - kernel/fs.ilock

rely:
  state_assumptions:
    - file system is initialized
  callable_interfaces:
    - bread/bwrite/brelse (from kernel/bio)
    - begin_op/end_op/log_write (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - per-inode sleeplock for inode operations
    - log.lock for transaction boundaries

guarantee:
  returns:
    - struct inode* (locked) on success
    - 0 on failure
  state_updates: []
  side_effects:
    - inode allocated on disk
    - inode cached in memory
  emitted_events: []

preconditions:
  []
postconditions:
  []
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - ialloc_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/fs.c
      symbols: [ialloc]
      owner: kernel/fs
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
