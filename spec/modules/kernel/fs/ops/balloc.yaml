id: kernel/fs.balloc

module: kernel/fs

operation: balloc
stage: filesystem
purpose: >
  Allocate a free disk block. Scan the block bitmap for a free bit, mark it allocated, and return the block number. Zero the block before returning.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/fs
  requires_ops:
    []

rely:
  state_assumptions:
    - file system is initialized
  callable_interfaces:
    - bread/bwrite/brelse (from kernel/bio)
    - begin_op/end_op/log_write (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - per-inode sleeplock for inode operations
    - log.lock for transaction boundaries

guarantee:
  returns:
    - uint (block number) on success
    - 0 on failure
  state_updates: []
  side_effects:
    - block marked in bitmap
    - block zeroed
  emitted_events: []

preconditions:
  - called within a transaction (begin_op/end_op)
postconditions:
  []
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - balloc_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/fs.c
      symbols: [balloc]
      owner: kernel/fs
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
