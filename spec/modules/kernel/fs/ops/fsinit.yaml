id: kernel/fs.fsinit

module: kernel/fs

operation: fsinit
stage: filesystem
purpose: >
  Initialize the file system: read the superblock, validate the magic number, initialize the log, and reclaim any in-use inodes from a previous session.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/fs
  requires_ops:
    []

rely:
  state_assumptions:
    - file system is initialized
  callable_interfaces:
    - bread/bwrite/brelse (from kernel/bio)
    - begin_op/end_op/log_write (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - per-inode sleeplock for inode operations
    - log.lock for transaction boundaries

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - superblock read
    - log initialized
    - inode cache populated
  emitted_events: []

preconditions:
  - called once during boot after disk init
postconditions:
  - sb.magic == FSMAGIC
  - log and inode cache ready
invariants_preserved:
  - file system is in a consistent state
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - fsinit_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/fs.c
      symbols: [fsinit]
      owner: kernel/fs
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
