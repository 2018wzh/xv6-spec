id: kernel/string.strncpy

module: kernel/string

operation: strncpy
stage: boot
purpose: >
  Copy at most n characters from t to s, padding with NULs if t is shorter than n.

related_slice: slice-01-boot
related_adr: null
depends_on:
  requires_modules:
    - kernel/string
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - char* (s)
  state_updates: []
  side_effects:
    - s[0..n-1] populated from t, padded with NULs
  emitted_events: []
preconditions:
  []
postconditions:
  - s is NUL-terminated only if strlen(t) < n
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - strncpy_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/string.c
      symbols: [strncpy]
      owner: kernel/string
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
