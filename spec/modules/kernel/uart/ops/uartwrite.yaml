id: kernel/uart.uartwrite

module: kernel/uart

operation: uartwrite
stage: device
purpose: >
  Transmit buf[n] to the UART using interrupt-driven I/O. Blocks if the UART is busy (tx_busy) by sleeping on tx_chan. Must NOT be called from interrupt context.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/uart
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - sleep/wakeup (from kernel/process)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - all n bytes transmitted to UART
  emitted_events: []
preconditions:
  - not called from interrupt context
postconditions:
  - bytes are in the UART transmit FIFO
invariants_preserved:
  []
failure_semantics:
  - none (blocks until complete)

concurrency:
  atomicity: tx_lock serializes writers
  lock_order:
    - tx_lock
  interrupt_state: enabled (may sleep)
  wait_wakeup_rules:
    - sleeps on &tx_chan while tx_busy
    - woken by uartintr

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uartwrite_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/uart.c
      symbols: [uartwrite]
      owner: kernel/uart
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
