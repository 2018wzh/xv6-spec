id: kernel/uart.uartputc_sync

module: kernel/uart

operation: uartputc_sync
stage: device
purpose: >
  Write a single byte to the UART synchronously, using polling. Disables interrupts via push_off for safety. Used by printk and panic for console output. Spins if panicked.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/uart
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - byte written to UART THR
  emitted_events: []
preconditions:
  - may be called from any context (including interrupt)
postconditions:
  - byte is visible on UART output
invariants_preserved:
  []
failure_semantics:
  - spins forever if panicked

concurrency:
  atomicity: push_off/pop_off disables interrupts during poll
  lock_order:
    []
  interrupt_state: disabled (push_off)
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uartputc_sync_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/uart.c
      symbols: [uartputc_sync]
      owner: kernel/uart
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
