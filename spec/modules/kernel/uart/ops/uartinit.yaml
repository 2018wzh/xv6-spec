id: kernel/uart.uartinit

module: kernel/uart

operation: uartinit
stage: device
purpose: >
  Initialize the 16550a UART: disable interrupts, set baud rate (38.4K), set 8-bit word length, enable FIFOs, enable transmit and receive interrupts, and initialize tx_lock.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/uart
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - initlock (from kernel/lock)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - UART configured and ready
    - tx_lock initialized
  emitted_events: []
preconditions:
  - called once during boot
postconditions:
  - UART is ready for transmit and receive
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uartinit_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/uart.c
      symbols: [uartinit]
      owner: kernel/uart
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
