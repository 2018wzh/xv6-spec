id: kernel/plic
module: kernel/plic
stage: device
purpose: >
  RISC-V Platform-Level Interrupt Controller (PLIC) driver. Sets IRQ priorities, enables per-hart S-mode interrupts, and provides claim/complete for interrupt dispatch.
related_slices:
  - slice-08-device
related_adrs:
  - ADR-003-device-driver-model
owned_state:
  - none (stateless; configures PLIC MMIO registers)
exported_interfaces:
  - plicinit
  - plicinithart
  - plic_claim
  - plic_complete
imported_interfaces:
module_invariants:
  - UART0_IRQ and VIRTIO0_IRQ are enabled for S-mode
  - each claimed interrupt is completed exactly once
  - PLIC priority threshold is set to 0 (accept all)
error_model:
  - spurious interrupts return an invalid IRQ number; caller must handle
resource_lifetime_rules:
  - plicinit runs once at boot
  - plicinithart runs per hart
security_boundary:
  - PLIC MMIO registers are S-mode only; userspace cannot access
test_surfaces:
  - unit tests for all exported functions
  - integration tests with dependent modules
