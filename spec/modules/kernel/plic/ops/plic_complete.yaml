id: kernel/plic.plic_complete

module: kernel/plic

operation: plic_complete
stage: device
purpose: >
  Signal to the PLIC that the given IRQ has been handled. Must be called after processing the interrupt.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/plic
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
