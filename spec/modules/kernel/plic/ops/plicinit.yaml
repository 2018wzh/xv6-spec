id: kernel/plic.plicinit

module: kernel/plic

operation: plicinit
stage: device
purpose: >
  Initialize the PLIC: set UART0_IRQ and VIRTIO0_IRQ priorities to 1 (non-zero = enabled). Called once at boot.

related_slice: slice-08-device
related_adr: null
depends_on:
  requires_modules:
    - kernel/plic
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - UART and VIRTIO IRQ priorities set
  emitted_events: []
preconditions:
  - called once during boot
postconditions:
  - PLIC is configured
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - plicinit_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/plic.c
      symbols: [plicinit]
      owner: kernel/plic
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
