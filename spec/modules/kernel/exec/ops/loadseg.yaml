id: kernel/exec.loadseg

module: kernel/exec

operation: loadseg
stage: filesystem
purpose: >
  Load an ELF program segment into a page table at virtual address va. Read sz bytes from the inode at offset into the already-mapped pages.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/exec
  requires_ops:
    - kernel/fs.readi
    - kernel/memory.walkaddr

rely:
  state_assumptions:
    - pages from va to va+sz are already mapped in pagetable
  callable_interfaces:
    - walkaddr (from kernel/memory)
    - readi (from kernel/fs)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success
    - -1 on failure
  state_updates: []
  side_effects:
    - program data copied from inode to physical pages
  emitted_events: []
preconditions:
  - va is page-aligned
  - pages are already mapped
postconditions:
  - segment data loaded into memory
invariants_preserved:
  - no unmapped pages are accessed
failure_semantics:
  - returns -1 if readi fails

concurrency:
  atomicity: non-atomic read loop
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - loadseg_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/exec.c
      symbols: [loadseg]
      owner: kernel/exec
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
