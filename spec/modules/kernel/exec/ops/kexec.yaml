id: kernel/exec.kexec

module: kernel/exec

operation: kexec
stage: filesystem
purpose: >
  Replace the current process's address space with a new program loaded from an ELF file at the given path. Validates ELF headers, loads program segments, sets up the user stack with argv, and swaps page tables.

related_slice: slice-06-filesystem
related_adr: null
depends_on:
  requires_modules:
    - kernel/exec
    - kernel/fs
    - kernel/memory
    - kernel/lock
  requires_ops:
    - kernel/fs.namei
    - kernel/fs.readi
    - kernel/memory.uvmalloc
    - kernel/memory.uvmfree
    - kernel/memory.copyout

rely:
  state_assumptions:
    - current process has a valid page table
  callable_interfaces:
    - namei/ilock/iunlockput/readi (from kernel/fs)
    - uvmalloc/proc_pagetable/proc_freepagetable (from vm/memory)
    - copyout/safestrcpy (utility)
    - begin_op/end_op (from kernel/log)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - no locks held during ELF loading (may be rescheduled)

guarantee:
  returns:
    - int: argc on success (in a0)
    - -1 on failure
  state_updates: []
  side_effects:
    - process address space replaced
    - old page table freed
    - new stack set up with argv
    - sepc set to ELF entry point
    - process name updated
  emitted_events: []
preconditions:
  - called from user context via sys_exec
postconditions:
  - on success: process runs the new program
  - on failure: original address space preserved
invariants_preserved:
  - ELF magic validated before loading
  - no partial address space replacement
failure_semantics:
  - returns -1; cleans up partial allocations; original process intact

concurrency:
  atomicity: non-atomic (may span timer interrupts)
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: namei validates path components
  isolation_boundary: new page table replaces old atomically
  user_pointer_policy: argv is copied via copyout to new stack

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - exec_valid_elf
    - exec_invalid_elf
    - exec_argv_passing
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/exec.c
      symbols: [kexec]
      owner: kernel/exec
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
