id: kernel/vm.vmfault

module: kernel/vm

operation: vmfault
stage: memory
purpose: >
  Handle a page fault for lazy allocation. Allocate a physical page and map it at the faulting address if within the process's valid range. Returns 0 on success, -1 on failure.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/vm
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - kalloc (from kernel/memory)
    - mappages (from kernel/memory)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - int: 0 on success (page allocated)
    - -1 on failure (invalid address or OOM)
  state_updates: []
  side_effects:
    - new physical page allocated and mapped
  emitted_events: []
preconditions:
  - faulting address is page-aligned and in valid range
postconditions:
  - page is mapped and zeroed
invariants_preserved:
  []
failure_semantics:
  - returns -1 if address is invalid or kalloc fails

concurrency:
  atomicity: single page allocation; may be preempted
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - vmfault_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/vm.c
      symbols: [vmfault]
      owner: kernel/vm
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
