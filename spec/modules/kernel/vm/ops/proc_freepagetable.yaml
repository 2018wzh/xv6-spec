id: kernel/vm.proc_freepagetable

module: kernel/vm

operation: proc_freepagetable
stage: memory
purpose: >
  Free a user page table and all its physical memory. Unmaps and frees the trapframe page, unmaps the trampoline (but does NOT free the trampoline page itself), and frees all user pages via uvmfree.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/vm
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - uvmunmap (from kernel/memory)
    - uvmfree (from kernel/memory)
    - kfree (from kernel/memory)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - page table freed
    - trapframe page freed
    - all user pages freed
    - trampoline unmapped but not freed
  emitted_events: []
preconditions:
  []
postconditions:
  - no dangling page table entries
  - all physical memory returned to freelist
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - proc_freepagetable_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/vm.c
      symbols: [proc_freepagetable]
      owner: kernel/vm
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
