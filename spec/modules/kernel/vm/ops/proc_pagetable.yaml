id: kernel/vm.proc_pagetable

module: kernel/vm

operation: proc_pagetable
stage: memory
purpose: >
  Create a new user page table for a process. Map the trampoline page at TRAMPOLINE (PTE_R|PTE_X) and allocate a trapframe page mapped at TRAPFRAME (PTE_R|PTE_W). Returns the new page table or 0 on failure.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/vm
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - kalloc (from kernel/memory)
    - mappages (from kernel/memory)
    - uvmfree (from kernel/memory)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - pagetable_t on success
    - 0 on failure
  state_updates: []
  side_effects:
    - new page table created
    - trampoline mapped
    - trapframe allocated and mapped
  emitted_events: []
preconditions:
  []
postconditions:
  - user page table has TRAMPOLINE and TRAPFRAME mappings
invariants_preserved:
  []
failure_semantics:
  - returns 0 on allocation failure; cleans up partial allocations

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - proc_pagetable_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/vm.c
      symbols: [proc_pagetable]
      owner: kernel/vm
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
