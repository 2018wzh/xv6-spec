id: kernel/vm.uvmclear

module: kernel/vm

operation: uvmclear
stage: memory
purpose: >
  Clear the User-access bit (PTE_U) on a single page in the given page table. Used to create a guard page below the user stack.

related_slice: slice-02-memory
related_adr: null
depends_on:
  requires_modules:
    - kernel/vm
  requires_ops:
    []

rely:
  state_assumptions:
  callable_interfaces:
    - walk (from kernel/memory)
  resource_assumptions:
    - sufficient resources available
  lock_assumptions:
    - none

guarantee:
  returns:
    - void
  state_updates: []
  side_effects:
    - PTE_U cleared on the target page
  emitted_events: []
preconditions:
  - page is mapped in pagetable
postconditions:
  - user cannot access the guard page
invariants_preserved:
  []
failure_semantics:
  - none

concurrency:
  atomicity: single operation
  lock_order:
    []
  interrupt_state: enabled
  wait_wakeup_rules:
    []

security:
  authority_check: none
  isolation_boundary: kernel-space only
  user_pointer_policy: none

observability:
  traces: []
  counters: []
  expected_logs: []

test_obligations:
  public:
    - uvmclear_basic
  generated: []
  hidden_tags:
    []

codegen:
  targets:
    - kind: symbol
      path: kernel/vm.c
      symbols: [uvmclear]
      owner: kernel/vm
      mode: create
  forbidden_changes:
    - do not modify code outside the marked region
    - do not create helper files
    - do not modify build scripts
  required_followup_checks:
    - make build
