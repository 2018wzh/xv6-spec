id: xv6-riscv-seed

project: xv6-riscv-kernel
domain: teaching-operating-system
target_platform: riscv64-qemu-virt
architecture_name: xv6-riscv-layered
architecture_summary: >
  A layered RISC-V 64-bit teaching kernel inspired by MIT xv6.
  Core subsystems are built incrementally: boot, memory, trap,
  process, and syscall. Each stage introduces one mechanism
  and is gated by a corresponding ArchitectureSlice.

reference_systems:
  - system: xv6-riscv (MIT 6.S081)
    borrowed_concepts:
      - physical page allocator with freelist
      - three-level RISC-V page table (Sv39)
      - trap frame for user/kernel context switch
      - round-robin scheduler
      - syscall dispatch table
      - buffer-cache block I/O layer with LRU eviction
      - logging/journaling for file-system crash safety
      - inode-based file system with directories and path resolution
      - pipe-based IPC
      - 16550a UART and virtio disk device drivers
    modified_concepts:
      - simplified boot path (single-hart, no S-mode init)
      - spec-driven code generation instead of hand-written C
    rejected_concepts:
      - COW fork (left to later stages)
      - multi-core support (left to later stages)
      - networking stack
    reason: >
      Full xv6-riscv specification covering all core subsystems.
      COW fork and multi-core are deferred as advanced topics.

goals:
  - boot to supervisor mode and print a banner
  - manage physical memory with a page allocator
  - set up Sv39 virtual memory with kernel page table
  - handle traps (interrupts, exceptions, syscalls)
  - create and schedule user processes
  - expose a minimal syscall interface (write, exit, fork, sbrk)
  - provide a buffer-cache layer for block I/O
  - implement a logging layer for file-system crash safety
  - provide an inode-based file system with directories and paths
  - support pipe-based inter-process communication
  - expose full file-system and process syscall interface
  - provide UART and virtio disk device drivers
  - support user-level shell and core utilities
non_goals:
  - multi-core support (single-hart only)
  - networking stack
  - full POSIX compliance
  - COW fork
constraints:
  - riscv64-unknown-elf-gcc toolchain
  - qemu-system-riscv64 virt machine
  - no_std bare-metal (no libc)
  - all code must be traceable to a spec clause
initial_validation_binding:
  - build_kernel
  - qemu_boot_smoke
  - verify_page_allocator
  - verify_kernel_page_table
  - verify_syscall_dispatch
  - verify_buffer_cache
  - verify_inode_ops
  - verify_file_ops
