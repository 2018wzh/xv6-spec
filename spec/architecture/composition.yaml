id: xv6-riscv-arch-composition

title: Cross-Module Architectural Composition
summary: >
  Synthesises the cross-cutting invariants, authority boundaries,
  and data-flow constraints that span multiple modules in the
  xv6-riscv kernel.

related_slices:
  - slice-01-boot
  - slice-02-memory
  - slice-03-trap
  - slice-04-process
  - slice-05-syscall
  - slice-06-filesystem
  - slice-07-ipc
  - slice-08-device
  - slice-09-full-syscall

affected_modules: [kernel, user]

cross_component_rules:
  - name: boot-to-paging-transition
    description: >
      After kvmmake, the kernel runs with Sv39 paging enabled.
      The boot path must not access physical addresses directly
      after satp is written.
    invariant: >
      All kernel accesses after paging_init use virtual addresses
      backed by kernel_pagetable.
    affected_modules: [kernel/boot, kernel/memory]
    tests: [kvmmake_identity_mapping]

  - name: trap-dispatches-to-syscall
    description: >
      usertrap dispatches software-interrupt ecalls to the
      syscall handler. No alternate path may bypass syscall
      number validation.
    invariant: >
      scause == 8 (environment call from U-mode) always
      reaches syscall() with sepc advanced by 4.
    affected_modules: [kernel/trap, kernel/syscall]
    tests: [usertrap_syscall_dispatched, syscall_valid_number]

  - name: syscall-validates-via-memory
    description: >
      Every syscall that accepts user pointers must route
      through walkaddr/copyin/copyout before dereferencing.
      No raw user address may be used as a kernel pointer.
    invariant: >
      Kernel never segfaults from a raw user pointer dereference.
    affected_modules: [kernel/syscall, kernel/memory]
    tests: [copyin_invalid_address, sys_write_invalid_buffer]

  - name: process-memory-isolation
    description: >
      User processes have independent page tables. No two
      processes share a writable page. The kernel page table
      is never exposed to U-mode.
    invariant: >
      satp in U-mode always points to the current process's
      user page table; kernel mappings are not accessible.
    affected_modules: [kernel/process, kernel/memory, kernel/trap]
    tests: [fork_memory_isolation]

  - name: buffer-cache-to-disk-chain
    description: >
      All file-system block I/O goes through the buffer-cache
      layer (bread/bwrite). The logging layer wraps multi-step
      updates with begin_op/end_op for crash safety. No code
      bypasses the buffer cache for on-disk blocks.
    invariant: >
      Every disk block read/write is mediated by a locked
      struct buf obtained via bread or bget.
    authority_boundary: >
      Only the virtio disk driver (virtio_disk_rw) performs
      actual device I/O; bread/bwrite call it under buffer lock.
    concurrency_boundary: >
      Buffer cache uses bcache.lock for list operations and
      per-buffer sleeplock for content access. Log uses log.lock
      and reference counting (log.outstanding).
    failure_boundary: >
      If virtio_disk_rw fails, bread panics. Log recovery
      replays committed transactions on boot.
    tests:
      - bread_cache_hit
      - log_recovery_after_crash

  - name: inode-file-fd-chain
    description: >
      File descriptors (struct file) reference inodes (struct
      inode) with reference counting. Closing an fd decrements
      the file ref count; when it reaches zero, iput is called.
      iput decrements the inode ref count; when it reaches zero,
      the inode is freed.
    invariant: >
      Every inode with nlink > 0 has ref >= 1. Every open file
      has a valid inode or pipe. No dangling references.
    authority_boundary: >
      File access is gated by struct file readable/writable flags.
      Inode access is gated by per-inode sleeplock.
    concurrency_boundary: >
      ftable.lock protects the file table. Per-inode sleeplock
      protects inode content. iput may trigger disk writes
      under log.begin_op/end_op.
    failure_boundary: >
      If an inode's nlink reaches zero and ref reaches zero,
      all its blocks are freed and the inode is cleared on disk.
    tests:
      - fd_refcount_cycle
      - inode_alloc_free_cycle

  - name: pipe-fd-sleep-chain
    description: >
      Pipe operations use sleep/wakeup for flow control. A writer
      blocks when the pipe is full; a reader blocks when the pipe
      is empty and the write end is open. Closing one end wakes
      the other.
    invariant: >
      Pipe data is never lost: every byte written is either read
      or discarded on close. No deadlock from concurrent pipe
      access on a single hart.
    authority_boundary: >
      Pipe access is gated through fd table (struct file with
      type FD_PIPE). Kernel never exposes raw pipe pointers
      to userspace.
    concurrency_boundary: >
      Pipe operations hold pi->lock (spinlock). sleep/wakeup
      on &pi->nread and &pi->nwrite coordinate blocking.
    failure_boundary: >
      If a process is killed while sleeping on a pipe, the
      syscall returns -1.
    tests:
      - pipe_read_write_cycle
      - pipe_blocking_full
      - pipe_close_wakeup

  - name: exec-address-space-replace
    description: >
      exec() replaces the entire process address space: it
      creates a new page table, loads ELF segments, sets up
      a user stack with argv, and swaps the old page table
      for the new one. On failure, the old address space
      is preserved.
    invariant: >
      After successful exec, the process has a clean address
      space with only the new program's segments mapped.
      The old page table is freed.
    authority_boundary: >
      exec validates ELF magic and program headers before
      loading. Path resolution uses namei which validates
      each component.
    concurrency_boundary: >
      exec may be rescheduled during ELF loading (no locks
      held during uvmalloc/loadseg). The old page table is
      only freed after the new one is fully set up.
    failure_boundary: >
      If exec fails at any point (bad ELF, OOM, invalid path),
      it returns -1 and the calling process continues with
      its original address space.
    tests:
      - exec_valid_elf
      - exec_invalid_elf
      - exec_argv_passing

  - name: plic-device-interrupt-chain
    description: >
      Device interrupts are routed through the PLIC: UART
      and virtio disk IRQs are enabled via plicinithart.
      devintr() in trap.c claims the interrupt from PLIC,
      dispatches to the appropriate handler, and completes
      the interrupt.
    invariant: >
      Every claimed interrupt is completed exactly once.
      Interrupt handlers run with interrupts disabled.
    authority_boundary: >
      PLIC memory-mapped registers are only accessible in
      S-mode. Userspace cannot trigger or mask device IRQs.
    concurrency_boundary: >
      PLIC claim/complete are per-hart operations. Device
      interrupt handlers (uartintr, virtio_disk_intr) run
      in interrupt context with push_off/pop_off.
    failure_boundary: >
      Spurious interrupts are acknowledged but otherwise
      ignored.
    tests:
      - plic_uart_interrupt
      - plic_disk_interrupt
