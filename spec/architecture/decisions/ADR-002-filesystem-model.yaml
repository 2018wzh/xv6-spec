id: ADR-002

date: 2025-01-02
status: accepted
decision: >
  Use an inode-based file system with fixed-size on-disk inode
  structures (struct dinode), an in-memory inode cache (struct inode
  with sleeplock), and a simple logging layer (write-ahead physical
  redo log) for crash safety. Directory entries contain inode numbers
  and fixed-size names (DIRSIZ=14). Path resolution walks directory
  entries component by component.
context: >
  xv6 requires a simple but complete file system suitable for teaching.
  The design must support concurrent file-system system calls, handle
  crash recovery, and demonstrate core OS file-system concepts (inodes,
  directories, block allocation, logging). The file-system image is
  created by a user-space mkfs tool and loaded as a virtio disk image.
alternatives:
  - option: FAT-based file system
    rejected_reason: Simpler to implement but less instructive for
      teaching Unix-style inode concepts.
  - option: Write-ahead logical log
    rejected_reason: Physical redo log is simpler and sufficient for
      a teaching kernel.
tradeoffs:
  - DIRSIZ=14 limits max filename length but keeps dirent size to 16 bytes.
  - Physical redo log requires writing entire blocks (not just deltas),
    which is less efficient but much simpler to implement and verify.
  - Single-threaded log commit simplifies semantics but limits FS
    throughput under load.
affected_specs:
  - slice-06-filesystem
  - modules: kernel/fs, kernel/bio, kernel/log, kernel/file
verification_impact:
  - log_recovery_after_crash test validates crash safety.
  - inode_alloc_free_cycle validates inode lifecycle.
  - bread_cache_hit validates buffer cache correctness.
