id: slice-09-full-syscall

stage: full-syscall
title: Full System Call Interface — Files, Pipes, Process Control
summary: >
  Complete the POSIX-like system call interface: file-system syscalls
  (open, close, read, write, dup, link, unlink, mkdir, chdir, mknod,
  fstat), pipe syscall, and process-control syscalls (getpid, kill,
  pause, uptime). All user-facing syscalls validate arguments and
  route through the fd table and file system.

depends_on_slices:
  - slice-05-syscall
  - slice-06-filesystem
  - slice-07-ipc
  - slice-08-device
depends_on_adrs: []

mechanisms:
  - fd-based file operations: sys_open, sys_close, sys_read, sys_write, sys_dup
  - file-system namespace: sys_link, sys_unlink, sys_mkdir, sys_chdir, sys_mknod
  - metadata: sys_fstat
  - pipe creation: sys_pipe
  - process identification: sys_getpid
  - signal: sys_kill
  - timing: sys_pause, sys_uptime
affected_modules:
  - kernel/sysfile
  - kernel/sysproc
  - kernel/file
  - kernel/fs
  - kernel/pipe
new_operations:
  - kernel/sysfile.argfd
  - kernel/sysfile.fdalloc
  - kernel/sysfile.sys_dup
  - kernel/sysfile.sys_read
  - kernel/sysfile.sys_write
  - kernel/sysfile.sys_close
  - kernel/sysfile.sys_fstat
  - kernel/sysfile.sys_link
  - kernel/sysfile.sys_unlink
  - kernel/sysfile.sys_open
  - kernel/sysfile.sys_mkdir
  - kernel/sysfile.sys_mknod
  - kernel/sysfile.sys_chdir
  - kernel/sysfile.sys_pipe
  - kernel/sysproc.sys_exit
  - kernel/sysproc.sys_getpid
  - kernel/sysproc.sys_fork
  - kernel/sysproc.sys_wait
  - kernel/sysproc.sys_sbrk
  - kernel/sysproc.sys_pause
  - kernel/sysproc.sys_kill
  - kernel/sysproc.sys_uptime
removed_or_replaced_mechanisms: []

invariants:
  - every open fd maps to a valid struct file with ref > 0
  - syscall numbers are bounds-checked before dispatch
  - all user pointers are validated via copyin/copyout/fetchaddr
  - file offset is updated atomically with successful read/write
  - path resolution uses namei which acquires and validates inodes
security_boundaries:
  - file access checked via readable/writable flags
  - path traversal restricted by directory permissions
  - pipe data copied through kernel, never directly shared
concurrency_highlights:
  - file operations hold inode locks during metadata access
  - pipe operations use pi->lock for mutual exclusion
  - syscalls execute with interrupts enabled (may be preempted by timer)
validation_binding:
  must_pass:
    - build_kernel
    - verify_file_syscalls
    - verify_pipe_syscall
    - verify_proc_syscalls
    - verify_path_resolution
open_questions: []
