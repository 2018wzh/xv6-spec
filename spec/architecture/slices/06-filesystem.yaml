invariants:
  - buffer cache uses LRU eviction: most-recently-used at head
  - every disk block is either in the buffer cache or on disk, never both stale
  - log commits are atomic: all or no blocks are written
  - inode reference count is always non-negative
  - directory entries never span block boundaries
  - file descriptor 0..NOFILE-1 either has a valid file* or is NULL
  - exec replaces the entire process address space atomically
security_boundaries:
  - file access is gated by readable/writable flags on struct file
  - path resolution validates every component before following
  - exec validates ELF headers before loading segments
  - user pointers in fileread/filewrite are validated by copyin/copyout
concurrency_highlights:
  - buffer cache uses bcache.lock (spinlock) for list management + sleeplock per buffer
  - log uses log.lock and begin_op/end_op reference counting
  - inode layer uses per-inode sleeplock
  - file table uses ftable.lock spinlock
  - exec does not hold locks during ELF loading (may be rescheduled)
validation_binding:
  must_pass:
    - build_kernel
    - verify_buffer_cache
    - verify_log_recovery
    - verify_inode_ops
    - verify_file_ops
    - verify_exec_basic
open_questions: []
