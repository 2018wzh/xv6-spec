id: slice-06-filesystem

stage: filesystem
title: File System — Buffer Cache, Logging, Inodes, Directories
summary: >
  Introduce the xv6 file system stack: buffer cache for block I/O,
  logging layer for crash-safe multi-step updates, inode allocation
  and management, directory entries and path resolution, file
  descriptor table with ref-counted file objects, and ELF executable
  loading via exec().

depends_on_slices:
  - slice-05-syscall
depends_on_adrs: []

mechanisms:
  - buffer cache with LRU eviction (binit, bread, bwrite, brelse, bpin, bunpin)
  - logging layer (initlog, begin_op, end_op, log_write, commit, recover_from_log)
  - superblock reading and filesystem initialization (readsb, fsinit)
  - block allocator and deallocator (balloc, bfree)
  - inode layer (ialloc, iupdate, iget, iput, ilock, iunlock, iunlockput)
  - inode read/write (readi, writei)
  - directory layer (dirlookup, dirlink, skipelem)
  - path resolution (namei, nameiparent)
  - file descriptor table (fileinit, filealloc, filedup, fileclose, filestat, fileread, filewrite)
  - ELF loading (kexec, loadseg, flags2perm)
  - sleeping locks for long-term locks (initsleeplock, acquiresleep, releasesleep, holdingsleep)
  - formatted kernel printing (printk, printkinit, panic)
