id: slice-07-ipc

stage: ipc
title: Inter-Process Communication — Pipes
summary: >
  Introduce pipe-based inter-process communication: paired file
  descriptors with a bounded kernel buffer, blocking read/write
  with sleep/wakeup semantics, and proper close handling.

depends_on_slices:
  - slice-06-filesystem
depends_on_adrs: []

mechanisms:
  - pipe allocation with two file descriptors (read end, write end)
  - bounded kernel buffer (PIPESIZE bytes) with nread/nwrite pointers
  - blocking pipewrite when buffer is full (sleep until reader consumes)
  - blocking piperead when buffer is empty and writer is still open
  - pipe close with wakeup of blocked readers/writers
affected_modules:
  - kernel/pipe
  - kernel/file
new_operations:
  - kernel/pipe.pipealloc
  - kernel/pipe.pipeclose
  - kernel/pipe.pipewrite
  - kernel/pipe.piperead
removed_or_replaced_mechanisms: []

invariants:
  - pipe buffer is a circular FIFO with PIPESIZE capacity
  - nwrite - nread <= PIPESIZE at all times
  - nread <= nwrite at all times
  - at most one reader and one writer per pipe
security_boundaries:
  - pipe data is copied through kernel buffer via copyin/copyout
  - pipe lifetime managed by reference counting via file descriptors
concurrency_highlights:
  - pipe operations use pi->lock spinlock
  - pipewrite blocks on full pipe via sleep(&pi->nwrite, &pi->lock)
  - piperead blocks on empty pipe via sleep(&pi->nread, &pi->lock)
  - pipeclose wakes blocked readers/writers
validation_binding:
  must_pass:
    - build_kernel
    - verify_pipe_read_write
    - verify_pipe_blocking
    - verify_pipe_close
open_questions: []
