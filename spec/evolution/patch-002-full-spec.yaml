id: patch-002-full-spec

stage: full-syscall
title: Full System Expansion
reason: >
  Expands the core syscall baseline into the full xv6-riscv
  teaching system: filesystem, IPC, device drivers, full file
  and process syscalls, and the supporting user-space libraries
  and programs.
kind: architecture_change

commit_sha: 9cc6437de3fc765373ea80348d8b2665f4366721
parent_sha: 522fc7de5906f768416af4d12d0fcb37787d08dc

affected_specs:
  - spec/architecture/decisions/ADR-002-filesystem-model.yaml
  - spec/architecture/decisions/ADR-003-device-driver-model.yaml
  - spec/architecture/slices/06-filesystem.yaml
  - spec/architecture/slices/07-ipc.yaml
  - spec/architecture/slices/08-device.yaml
  - spec/architecture/slices/09-full-syscall.yaml
  - spec/architecture/composition.yaml
  - spec/modules/kernel/bio/module.yaml
  - spec/modules/kernel/console/module.yaml
  - spec/modules/kernel/exec/module.yaml
  - spec/modules/kernel/file/module.yaml
  - spec/modules/kernel/fs/module.yaml
  - spec/modules/kernel/lock/module.yaml
  - spec/modules/kernel/log/module.yaml
  - spec/modules/kernel/pipe/module.yaml
  - spec/modules/kernel/plic/module.yaml
  - spec/modules/kernel/printk/module.yaml
  - spec/modules/kernel/start/module.yaml
  - spec/modules/kernel/string/module.yaml
  - spec/modules/kernel/sysfile/module.yaml
  - spec/modules/kernel/sysproc/module.yaml
  - spec/modules/kernel/uart/module.yaml
  - spec/modules/kernel/virtio/module.yaml
  - spec/modules/kernel/vm/module.yaml
  - spec/modules/user/lib/module.yaml
