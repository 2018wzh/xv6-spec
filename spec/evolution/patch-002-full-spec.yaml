id: patch-002-full-spec
stage: full-syscall
title: Full System Expansion
reason: |
  Expands the core syscall baseline into the full xv6-riscv teaching system: filesystem, IPC, device drivers, full file and process syscalls, and the supporting user-space libraries and programs.
