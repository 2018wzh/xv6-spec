  - user/programs.generate_sh_c
  - user/tests.generate_usertests_c

before:
  description: Core syscall-stage baseline with boot, memory, trap, process, and minimal syscall support.
after:
  description: >
    Full xv6-riscv system specification covering filesystem,
    pipes, device drivers, shell utilities, and the extended
    file/process syscall surface.

risks:
  - The expanded spec is significantly larger and may require
    follow-on verification tuning for filesystem and device
    interactions.
  - Some stage-two operations are sensitive to concurrency and
    resource lifetime edge cases.
required_regressions:
  - All early-stage public requirements must remain valid.
  - All later-stage public_requirements in spec/verification/public-matrix.yaml
    must pass after the expansion is applied.
approval_notes: >
  This patch is the second course-stage expansion. It must be
  paired with the commit that introduces the late-stage modules
  and verification coverage.
