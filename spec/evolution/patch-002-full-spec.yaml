  - spec/modules/user/tests/module.yaml
  - spec/verification/public-matrix.yaml
  - spec/verification/evidence-schema.yaml

affected_modules:
  - kernel
  - user

affected_operations:
  - kernel/bio.bread
  - kernel/bio.bwrite
  - kernel/console.consolewrite
  - kernel/exec.kexec
  - kernel/file.filealloc
  - kernel/file.fileclose
  - kernel/fs.ialloc
  - kernel/fs.iput
  - kernel/pipe.pipealloc
  - kernel/pipe.pipewrite
  - kernel/pipe.piperead
  - kernel/plic.plicinit
  - kernel/printk.printk
