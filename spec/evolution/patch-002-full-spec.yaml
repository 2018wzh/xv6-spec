before:
  description: Core syscall-stage baseline with boot, memory, trap, process, and minimal syscall support.
after:
  description: |
    Full xv6-riscv system specification covering filesystem, pipes, device drivers, shell utilities, and the extended file/process syscall surface.
risks:
  - The expanded spec is significantly larger and may require follow-on verification tuning for filesystem and device interactions.
  - Some stage-two operations are sensitive to concurrency and resource lifetime edge cases.
required_regressions:
  - build_kernel
  - verify_buffer_cache
  - verify_console_echo
  - verify_disk_read
  - verify_exec
  - verify_file_syscalls
  - verify_inode_ops
  - verify_pipe_close
  - verify_pipe_read_write
  - verify_pipe_syscall
  - verify_proc_syscalls
  - verify_uart_output
approval_notes: |
  This patch is the second course-stage expansion. It must be paired with the commit that introduces the late-stage modules and verification coverage.
