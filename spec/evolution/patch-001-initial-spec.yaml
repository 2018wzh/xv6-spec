before:
  description: No specification existed.
after:
  description: |
    Core five-stage architecture specification with ArchitectureSeed, ArchitectureSlices, ADR-001, CompositionSpec, module specs, and operation contracts for the boot, memory, trap, process, and syscall stages.
risks:
  - Spec may be incomplete for stage-two filesystem, IPC, device, and full-syscall expansion; these will be refined via follow-on patches.
required_regressions:
  - build_kernel
  - qemu_boot_smoke
  - verify_boot_banner
  - verify_fork_exit_wait
  - verify_fork_syscall
  - verify_kernel_page_table
  - verify_page_allocator
  - verify_sys_write
  - verify_syscall_dispatch
  - verify_timer_interrupt
  - verify_trap_vector
approval_notes: |
  This patch serves as the immutable baseline. Any structural change to the architecture, module interfaces, or operation contracts must be accompanied by a new SpecPatch.
