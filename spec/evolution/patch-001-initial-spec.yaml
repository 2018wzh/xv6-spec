id: patch-001-initial-spec

stage: syscall
title: Initial Core Spec Snapshot
reason: >
  Captures the baseline specification state for the xv6-riscv
  kernel after the core boot/memory/trap/process/syscall
  stages have been defined. All subsequent evolutions must be
  recorded as follow-on SpecPatches.
kind: architecture_change

commit_sha: 522fc7de5906f768416af4d12d0fcb37787d08dc
parent_sha: c3d69fa1e471a7ec4a923e85373b007cecf2ce53

affected_specs:
  - spec/architecture/seed.yaml

  - spec/architecture/timeline.yaml

  - spec/architecture/composition.yaml

  - spec/architecture/decisions/ADR-001-paging-model.yaml

  - spec/architecture/slices/01-boot.yaml

  - spec/architecture/slices/02-memory.yaml

  - spec/architecture/slices/03-trap.yaml

  - spec/architecture/slices/04-process.yaml

  - spec/architecture/slices/05-syscall.yaml

affected_modules:
  - kernel
  - user

affected_operations: []

before:
  description: No specification existed.
after:
  description: >
    Core five-stage architecture specification with ArchitectureSeed,
    ArchitectureSlices, ADR-001, CompositionSpec, module specs, and
    operation contracts for the boot, memory, trap, process, and
    syscall stages.

risks:
  - Spec may be incomplete for stage-two filesystem, IPC, device,
    and full-syscall expansion; these will be refined via follow-on
    patches.
required_regressions:
  - All public_requirements in spec/verification/public-matrix.yaml
    for the early stages must remain valid after this patch is applied.
approval_notes: >
  This patch serves as the immutable baseline. Any structural change
  to the architecture, module interfaces, or operation contracts must
  be accompanied by a new SpecPatch.
