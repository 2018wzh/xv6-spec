# xv6 RISC-V QEMU run specification

run:
  emulator: qemu-system-riscv64
  machine: virt
  cpu: rv64
  memory: 128M
  bios: default
  kernel_arg: -kernel
  extra_args:
    - boot-smoke
    - -nographic
    - -no-reboot
    - -serial
    - mon:stdio
  success_signal: 'init: starting sh\s+\$ '
  timeout_secs: 30
