id: trap-syscall-process-composition

title: Trap / Syscall / Process Cross-Module Composition
related_slices:
  - slice-03-trap
  - slice-04-process
  - slice-05-syscall
affected_modules:
  - kernel/trap

  - kernel/syscall

  - kernel/process

  - kernel/memory


cross_component_rules:
  - name: ecall-trap-dispatch-chain
    description: >
      A user-mode ecall must follow this path:
      ecall -> uservec (trampoline) -> usertrap ->
      syscall -> handler -> usertrapret -> userret.
    invariant: >
      No alternate path bypasses user-pointer validation.
    authority_boundary: >
      Trap handler switches to kernel page table before
      calling any syscall handler.
    concurrency_boundary: >
      The entire chain is non-preemptible on a single hart;
      timer interrupts are disabled until usertrapret.
    failure_boundary: >
      If any step in the chain panics or returns invalid
      state, the process is killed via exit(-1).
    tests:
      - ecall_roundtrip
      - ecall_invalid_syscall_number

  - name: fork-copy-isolation
    description: >
      After fork, every page accessible by the child must
      be an independent copy of the parent's page.
      No PTE_W pages may be shared.
    invariant: >
      Child address space is write-isolated from parent.
    authority_boundary: >
      Both parent and child run in U-mode with independent
      page tables.
    concurrency_boundary: >
      Fork does not hold locks during page copying; parent
      may be rescheduled during uvmcopy.
    failure_boundary: >
      If uvmcopy fails due to OOM, fork returns -1 and
      any partially copied pages are freed.
    tests:
      - fork_memory_isolation
      - fork_oom_cleanup

  - name: exit-wait-lifetime
    description: >
      When a process calls exit, its state becomes ZOMBIE.
      The parent's wait() call reaps it, freeing all
      resources. Before exit, children are reparented to
      init (process 1).
    invariant: >
      No process is orphaned; every ZOMBIE has a parent
      that can reap it.
    authority_boundary: >
      Only parent/init can reap a ZOMBIE child.
    concurrency_boundary: >
      Exit holds p->lock and wait_lock. Wait acquires
      wait_lock before scanning children.
    failure_boundary: >
      If init exits, the system panics.
    tests:
      - exit_zombie_parent_wait
      - exit_orphan_reparent

  - name: user-pointer-validation-chain
    description: >
      Every syscall that accepts a user pointer must
      validate it via walkaddr (in copyin/copyout/fetchaddr)
      before any dereference.
    invariant: >
      No kernel segfault from raw user pointer dereference.
    authority_boundary: >
      walkaddr checks U-bit on PTE; kernel-only pages
      return 0.
    concurrency_boundary: >
      Between validation and use, the user page table
      might change (another process shares no memory).
      Single-hart makes this safe for in-syscall usage.
    failure_boundary: >
      Invalid pointers cause sys_write/copyin/copyout to
      return -1.
    tests:
      - sys_write_invalid_buffer
      - copyin_invalid_address
      - copyout_readonly_page
