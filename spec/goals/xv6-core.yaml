goal_id: xv6-core-full
category: core-functionality
summary: >
  Achieve a complete, bootable xv6-riscv kernel that passes all public
  validation gates across all nine stages: boot, memory, trap, process,
  syscall, filesystem, ipc, device, and full-syscall. The kernel must
  boot to a shell prompt, support the full POSIX-like syscall interface,
  and pass the usertests regression suite.

baseline: No kernel exists; the project starts from scratch.
target: >
  All public_requirements listed in spec/verification/public-matrix.yaml
  pass, and the kernel boots to a user-mode shell prompt via QEMU that
  can execute all standard user programs (cat, echo, grep, ls, sh, etc.).

correctness_guard:
  - No kernel segfault from raw user-pointer dereference.
  - Page allocator freelist integrity under alloc-free cycles.
  - Process isolation: after fork, child and parent share no writable pages.
  - File system consistency: after crash, log recovery restores a consistent state.
  - Pipe data integrity: every byte written is either read or discarded on close.
  - Buffer cache: no stale data returned after write.

benchmark_or_oracle:
  - QEMU boot smoke: XV6_BOOT_OK appears in UART output within 30 s.
  - Syscall round-trip: ecall -> usertrap -> syscall -> usertrapret without panic.
  - usertests: all sub-tests pass without kernel panic.
  - Shell: accepts and executes commands from stdin.

negative_tradeoff_checks:
  - No debug or verbose logging is permanently enabled in release builds.
  - Memory allocator must not leak pages under repeated alloc/free stress.
  - File system must not leak inodes or blocks under create/delete stress.

evidence_required:
  - QEMU boot log
  - Kernel ELF build artifact
  - Page allocator test log
  - Fork/exit/wait test log
  - Syscall dispatch test log
  - File system test log
  - Pipe test log
  - usertests output log
