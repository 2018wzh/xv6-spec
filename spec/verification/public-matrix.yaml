stage: xv6-core
public_requirements:
  - id: verify-boot-banner
    description: Kernel prints boot banner before XV6_BOOT_OK
    related_specs:
      - module: kernel/boot
        operation: boot_banner
    required_tests:
      - bootstrap_banner_not_null
      - bootstrap_banner_length_positive
      - boot_banner_printable
    required_artifacts:
      - build/qemu_boot.log

  - id: verify-page-allocator
    description: Physical page allocator passes alloc-free cycle
    related_specs:
      - module: kernel/memory
        operation: kalloc
      - module: kernel/memory
        operation: kfree
    required_tests:
      - kalloc_exhaustion
      - kalloc_alignment
      - kalloc_kfree_cycle
    required_artifacts:
      - build/kernel.elf

  - id: verify-kernel-page-table
    description: Kernel page table maps identity and trampoline
    related_specs:
      - module: kernel/memory
        operation: kvmmake
    required_tests:
      - kvmmake_identity_mapping
      - kvmmake_trampoline_mapped
    required_artifacts:
      - build/kernel.elf

  - id: verify-trap-vector
    description: stvec is correctly set after trap_init
    related_specs:
      - module: kernel/trap
        operation: trap_init
    required_tests:
      - trap_init_stvec_set
    required_artifacts:
      - build/kernel.elf

  - id: verify-timer-interrupt
    description: Timer interrupts are handled and re-scheduled
    related_specs:
      - module: kernel/trap
        operation: devintr
      - module: kernel/trap
        operation: usertrap
    required_tests:
      - devintr_timer
      - usertrap_timer
    required_artifacts:
      - build/qemu_timer.log

  - id: verify-fork-exit-wait
    description: Fork, exit, wait lifecycle is correct
    related_specs:
      - module: kernel/process
        operation: fork
      - module: kernel/process
        operation: exit
      - module: kernel/process
        operation: wait
    required_tests:
      - fork_returns_different_pid
      - fork_memory_isolation
      - exit_zombie
      - wait_reap_child
    required_artifacts:
      - build/kernel.elf

  - id: verify-syscall-dispatch
    description: Syscall numbers are validated and dispatched
    related_specs:
      - module: kernel/syscall
        operation: syscall
    required_tests:
      - syscall_valid_number
      - syscall_invalid_number
    required_artifacts:
      - build/kernel.elf

  - id: verify-sys-write
    description: sys_write validates buffer and writes bytes
    related_specs:
      - module: kernel/syscall
        operation: sys_write
    required_tests:
      - invalid_user_pointer_write
      - sys_write_basic
      - sys_write_large_buffer
    required_artifacts:
      - build/kernel.elf

  - id: verify-fork-syscall
    description: sys_fork creates child and returns PIDs
    related_specs:
      - module: kernel/syscall
        operation: sys_fork
    required_tests:
      - sys_fork_parent_pid
      - sys_fork_child_zero
    required_artifacts:
      - build/kernel.elf

  - id: verify-sbrk
    description: sys_sbrk grows and shrinks address space
    related_specs:
      - module: kernel/syscall
        operation: sys_sbrk
    required_tests:
      - sys_sbrk_grow
      - sys_sbrk_shrink
    required_artifacts:
      - build/kernel.elf

  - id: verify-buffer-cache
    description: Buffer cache returns valid cached blocks
    related_specs:
      - module: kernel/bio
        operation: bread
      - module: kernel/bio
        operation: bwrite
    required_tests:
      - bread_cache_hit
      - bread_cache_miss
      - bwrite_verify
    required_artifacts:
      - build/kernel.elf

  - id: verify-log-recovery
    description: Log recovery restores file system consistency
    related_specs:
      - module: kernel/log
        operation: commit
      - module: kernel/log
        operation: recover_from_log
    required_tests:
      - log_recovery_committed
      - log_recovery_empty
    required_artifacts:
      - build/kernel.elf

  - id: verify-inode-ops
    description: Inode allocation and deallocation is correct
    related_specs:
      - module: kernel/fs
        operation: ialloc
      - module: kernel/fs
        operation: iput
    required_tests:
      - inode_alloc_free_cycle
      - inode_ref_count
    required_artifacts:
      - build/kernel.elf

  - id: verify-file-ops
    description: File descriptor operations are correct
    related_specs:
      - module: kernel/file
        operation: filealloc
      - module: kernel/file
        operation: fileclose
    required_tests:
      - fd_alloc_close_cycle
      - fd_ref_count
    required_artifacts:
      - build/kernel.elf

  - id: verify-exec
    description: exec loads ELF and replaces address space
    related_specs:
      - module: kernel/exec
        operation: kexec
    required_tests:
      - exec_valid_elf
      - exec_invalid_elf
      - exec_argv_passing
    required_artifacts:
      - build/kernel.elf

  - id: verify-pipe
    description: Pipe read/write and blocking are correct
    related_specs:
      - module: kernel/pipe
        operation: pipealloc
      - module: kernel/pipe
        operation: pipewrite
      - module: kernel/pipe
        operation: piperead
    required_tests:
      - pipe_read_write_cycle
      - pipe_blocking_full
      - pipe_close_wakeup
    required_artifacts:
      - build/kernel.elf

  - id: verify-uart
    description: UART transmits and receives characters
    related_specs:
      - module: kernel/uart
        operation: uartinit
      - module: kernel/uart
        operation: uartwrite
    required_tests:
      - uart_boot_output
      - uart_echo
    required_artifacts:
      - build/qemu_boot.log

  - id: verify-disk
    description: Virtio disk reads and writes correctly
    related_specs:
      - module: kernel/virtio
        operation: virtio_disk_rw
    required_tests:
      - disk_read_write
      - disk_init
    required_artifacts:
      - build/kernel.elf

  - id: verify-file-syscalls
    description: File system syscalls work end-to-end
    related_specs:
      - module: kernel/sysfile
        operation: sys_open
      - module: kernel/sysfile
        operation: sys_read
      - module: kernel/sysfile
        operation: sys_write
      - module: kernel/sysfile
        operation: sys_close
    required_tests:
      - open_read_write_close
      - dup_functional
      - link_unlink
    required_artifacts:
      - build/kernel.elf

  - id: verify-pipe-syscall
    description: Pipe syscall creates usable pipe
    related_specs:
      - module: kernel/sysfile
        operation: sys_pipe
    required_tests:
      - sys_pipe_create
      - sys_pipe_read_write
    required_artifacts:
      - build/kernel.elf

  - id: verify-shell
    description: Shell boots and executes commands
    related_specs:
      - module: user/programs
        operation: generate_sh_c
    required_tests:
      - shell_boots
      - shell_executes_echo
    required_artifacts:
      - build/qemu_boot.log

  - id: verify-usertests
    description: usertests regression suite passes
    related_specs:
      - module: user/tests
        operation: generate_usertests_c
    required_tests:
      - usertests_all_pass
    required_artifacts:
      - build/kernel.elf
