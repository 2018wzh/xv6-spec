spec_root = "spec"

[agent]
provider = "openai-compatible"
model = "compat:ecnu-max"
base_url = "https://chat.ecnu.edu.cn/open/api/v1"
timeout_secs = 600
[agent.auth]
env = "ECNU_API_KEY"

[agent.retry]
max_attempts = 2

[kb.embedding]
provider = "openai"
base_url = "https://chat.ecnu.edu.cn/open/api/v1"
model = "ecnu-embedding-small"
[kb.embedding.auth]
env = "ECNU_API_KEY"
