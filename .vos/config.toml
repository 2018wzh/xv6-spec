spec_root = "spec"

[agent]
provider = "deepseek"
model = "deepseek-v4-pro"
base_url = "https://api.deepseek.com/v1"
timeout_secs = 600
[agent.auth]
env = "DEEPSEEK_API_KEY"

[agent.retry]
max_attempts = 2

[kb.embedding]
provider = "openai"
base_url = "https://chat.ecnu.edu.cn/open/api/v1"
model = "ecnu-embedding-small"
[kb.embedding.auth]
env = "ECNU_API_KEY"
